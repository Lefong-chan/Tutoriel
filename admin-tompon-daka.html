<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Admin Phone OTP</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:20px;
}

h1,h2{
  text-align:center;
}

#loginBox{
  text-align:center;
  margin-top:60px;
}

input{
  padding:10px;
  width:250px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 15px;
  border:none;
  background:#00c853;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

button:hover{
  background:#00e676;
}

#error{
  color:#ff5252;
  margin-top:10px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#1e1e1e;
}

th,td{
  padding:12px;
  border:1px solid #333;
  text-align:center;
}

th{
  background:#222;
}

tr:nth-child(even){
  background:#181818;
}

.expired{
  color:#ff5252;
  font-weight:bold;
}

.valid{
  color:#00e676;
  font-weight:bold;
}

.logout{
  background:#ff1744;
  margin-bottom:15px;
}

.refresh{
  background:#2962ff;
  margin-bottom:15px;
  margin-left:10px;
}

.top-bar{
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>
<body>

<h1>📱 Phone OTP Admin Panel</h1>

<div id="loginBox">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <br><br>
  <button onclick="login()">Login</button>
  <p id="error"></p>
</div>

<div id="panel" style="display:none;">

  <div class="top-bar">
    <button class="logout" onclick="logout()">Logout</button>
    <button class="refresh" onclick="loadOTPs()">🔄 Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>UID</th>
        <th>Phone</th>
        <th>OTP Code</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="otpTable">
      <tr>
        <td colspan="4">Click Refresh to load data</td>
      </tr>
    </tbody>
  </table>

</div>

<script>

let savedPassword = "";

async function login(){

  const pass = document.getElementById("pass").value;

  if(!pass){
    document.getElementById("error").innerText="Enter password";
    return;
  }

  savedPassword = pass;

  const res = await fetch("/api/admin-phone-otp",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ password: pass })
  });

  if(res.status !== 200){
    document.getElementById("error").innerText="Wrong password";
    return;
  }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("panel").style.display="block";
}

function logout(){
  savedPassword="";
  document.getElementById("panel").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

async function loadOTPs(){

  const table = document.getElementById("otpTable");
  table.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

  try{

    const res = await fetch("/api/admin-phone-otp",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ password: savedPassword })
    });

    if(res.status !== 200){
      logout();
      return;
    }

    const data = await res.json();

    if(data.length === 0){
      table.innerHTML = "<tr><td colspan='4'>No pending verification</td></tr>";
      return;
    }

    table.innerHTML="";

    const now = Date.now();

    data.forEach(user=>{

      const expired = user.phoneOTPExpires < now;

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${user.uid}</td>
        <td>${user.phone}</td>
        <td style="font-size:20px;font-weight:bold;">
          ${user.phoneOTP}
        </td>
        <td class="${expired ? "expired":"valid"}">
          ${expired ? "Expired":"Valid"}
        </td>
      `;

      table.appendChild(row);
    });

  }catch(err){
    table.innerHTML="<tr><td colspan='4'>Error loading data</td></tr>";
  }
}

</script>

</body>
</html>
