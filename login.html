<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="identifier" placeholder="Username or Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<br><br>
<hr>
<br>

<button onclick="googleLogin()">Continue with Google</button>

<br><br>
<p id="debug" style="color:red;"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDMr3plGs8sF56pM_O3jYqfGdWTlJiePW0",
  authDomain: "tutoriel-ff487.firebaseapp.com",
  projectId: "tutoriel-ff487",
  appId: "1:128298277579:web:e0f7d2622612ed297f594e"
};

/* ================= INITIALIZE ================= */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ================= NORMAL LOGIN ================= */

window.login = async function() {

  const identifier = document.getElementById("identifier").value.trim();
  const password = document.getElementById("password").value;

  if (!identifier || !password) {
    alert("Please fill in all fields.");
    return;
  }

  try {

    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ identifier, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "home.html";
    } else {
      alert(data.error);
    }

  } catch {
    alert("Login failed.");
  }
};

/* ================= GOOGLE LOGIN (DEBUG VERSION) ================= */

window.googleLogin = async function() {

  const debug = document.getElementById("debug");

  try {

    debug.innerText = "Opening Google popup...";

    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    debug.innerText = "Getting ID token...";

    const idToken = await user.getIdToken(true);

    if (!idToken) {
      debug.innerText = "No idToken received!";
      return;
    }

    debug.innerText = "Sending token to server...";

    const res = await fetch("/api/google-login", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idToken })
    });

    const data = await res.json();

    debug.innerText = "Server response: " + JSON.stringify(data);

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "home.html";
    }

  } catch (error) {

    debug.innerText = "Error: " + error.message;
  }
};

</script>

</body>
</html>
