<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <!-- Firebase SDK (compat version for window.firebase) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

<h2>Register</h2>

<input id="username" placeholder="Username"><br><br>
<input id="email" type="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="repeatPassword" type="password" placeholder="Repeat Password"><br><br>

<button onclick="register()">Register</button>

<hr>

<button onclick="continueWithGoogle()">Continue with Google</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDMr3plGs8sF56pM_O3jYqfGdWTlJiePW0",
  authDomain: "tutoriel-ff487.firebaseapp.com",
  databaseURL: "https://tutoriel-ff487-default-rtdb.firebaseio.com",
  projectId: "tutoriel-ff487",
  storageBucket: "tutoriel-ff487.firebasestorage.app",
  messagingSenderId: "128298277579",
  appId: "1:128298277579:web:e0f7d2622612ed297f594e",
  measurementId: "G-CRXJH8QL8V"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

async function register() {

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;
  const repeatPassword = document.getElementById("repeatPassword").value;

  if (!username || !email || !password || !repeatPassword) {
    alert("Please fill in all fields.");
    return;
  }

  if (password !== repeatPassword) {
    alert("Passwords do not match.");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, email, password })
  });

  const data = await res.json();

  if (data.success) {
    alert("Registration successful!");
    window.location.href = "login.html";
  } else {
    alert(data.error);
  }
}

async function continueWithGoogle() {

  const provider = new firebase.auth.GoogleAuthProvider();

  try {
    const result = await auth.signInWithPopup(provider);
    const email = result.user.email;

    const res = await fetch("/api/google-register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.needUsername) {
      localStorage.setItem("googleEmail", email);
      window.location.href = "google-username.html";
    } else if (data.error) {
      alert(data.error);
    }

  } catch (err) {
    alert("Google sign-in failed.");
  }
}

</script>

</body>
  </html>
