<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ── Bande joueurs ── */
    #players-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 800px;
      margin-bottom: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      color: white;
      font-size: 1em;
      font-weight: 700;
      min-height: 44px;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.6);
    }
    .dot-maintso { background: #22c55e; }
    .dot-mena    { background: #ef4444; }
    .player-name { font-size: 0.95em; }
    .player-label {
      font-size: 0.7em;
      font-weight: 400;
      opacity: 0.75;
      margin-left: 2px;
    }
    .vs-sep {
      font-size: 0.85em;
      opacity: 0.6;
      font-weight: 400;
    }

    /* ── Plateau ── */
    #game-board {
      width: 95vw;
      max-width: 800px;
      max-height: 75vh;
      display: block;
    }
    .grid-line { stroke: #333; stroke-width: 2; }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0092FF;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      font-size: 1.2em;
      font-weight: 700;
      flex-direction: column;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Erreur ── */
    #error-msg {
      display: none;
      color: #fef08a;
      font-size: 1em;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>Fananganana ny lalao…</span>
  </div>

  <!-- Bande joueurs -->
  <div id="players-bar" style="display:none;">
    <!-- rempli par JS -->
  </div>

  <!-- Plateau SVG -->
  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>

    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
      M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
      M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
      M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
      M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
      M300 0 L400 100 M400 0 L200 200
      M0 100 L100 200 M400 100 L300 200"/>

    <g id="pieces-group"></g>
  </svg>

  <div id="error-msg"></div>

  <script>
  (function() {
    var SESSION_API_URL = '/api/session';

    // ── Lire les paramètres URL ──────────────────────────────
    var params   = new URLSearchParams(window.location.search);
    var gameId   = params.get('gameId');
    var myColor  = params.get('color');   // 'maintso' ou 'mena'
    var inviteId = params.get('inviteId');

    var rows = ['A','B','C','D','E'];
    var cols = ['1','2','3','4','5','6','7','8','9'];

    // ── Helpers ──────────────────────────────────────────────
    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    async function callSessionApi(action, payload) {
      var r = await fetch(SESSION_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action }, payload))
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Session error.');
      return d;
    }

    // ── Dessin du plateau ────────────────────────────────────
    // myColor = 'maintso' → maintso en bas (rangées D,E proches de l'utilisateur)
    // myColor = 'mena'    → mena en bas
    // Le plateau SVG est dessiné row A (ri=0) en haut, row E (ri=4) en bas.
    // Si myColor='maintso' : maintso (ri>2) est déjà en bas → OK
    // Si myColor='mena'    : on inverse l'axe Y pour que mena soit en bas

    function drawPieces(pieces, myCol) {
      var grp = document.getElementById('pieces-group');
      grp.innerHTML = '';

      var flip = (myCol === 'mena'); // si mena, on retourne le plateau

      for (var spot in pieces) {
        var ri = rows.indexOf(spot[0]);
        var ci = cols.indexOf(spot[1]);
        if (ri < 0 || ci < 0) continue;
        var color = pieces[spot];

        // Coordonnées SVG
        var svgX = ci * 50;
        var svgY = flip ? (4 - ri) * 50 : ri * 50; // inversion Y si mena

        var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("transform", "translate(" + svgX + "," + svgY + ")");

        var circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", "12");
        circle.setAttribute("fill", "url(#" + color + "-pat)");

        g.appendChild(circle);
        grp.appendChild(g);
      }
    }

    // ── Bande joueurs ────────────────────────────────────────
    // myColor=maintso → je suis en bas (Green), adversaire en haut (Red)
    // myColor=mena    → je suis en bas (Red),   adversaire en haut (Green)
    function renderPlayersBar(myCol, myUsername, oppUsername) {
      var bar = document.getElementById('players-bar');

      // Joueur du bas = moi, joueur du haut = adversaire
      // Dans la barre : adversaire à gauche (haut du plateau), moi à droite (bas)
      var myDotClass  = myCol === 'maintso' ? 'dot-maintso' : 'dot-mena';
      var oppDotClass = myCol === 'maintso' ? 'dot-mena'    : 'dot-maintso';

      bar.innerHTML =
        '<div class="player-info">' +
          '<div class="player-dot ' + oppDotClass + '"></div>' +
          '<span class="player-name">' + escapeHtml(oppUsername) + '</span>' +
          '<span class="player-label">(adversaire)</span>' +
        '</div>' +
        '<span class="vs-sep">VS</span>' +
        '<div class="player-info">' +
          '<span class="player-label">(ianao)</span>' +
          '<span class="player-name">' + escapeHtml(myUsername) + '</span>' +
          '<div class="player-dot ' + myDotClass + '"></div>' +
        '</div>';

      bar.style.display = 'flex';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Initialisation ───────────────────────────────────────
    async function init() {
      // Vérifier les paramètres
      if (!gameId || !myColor || !inviteId) {
        showError('Diso ny fampidirana: tsy misy gameId na color.');
        return;
      }
      if (myColor !== 'maintso' && myColor !== 'mena') {
        showError('Diso ny color: ' + myColor);
        return;
      }

      // Récupérer session locale
      var stored = localStorage.getItem('user');
      if (!stored) { window.location.href = 'login&register.html'; return; }
      var localUser = null;
      try { localUser = JSON.parse(stored); } catch(e) {}
      if (!localUser || !localUser.uid) { window.location.href = 'login&register.html'; return; }

      try {
        // Récupérer les données du jeu depuis le backend (RTDB)
        var data = await callSessionApi('get-fanorona-game', {
          uid:    localUser.uid,
          gameId: gameId
        });

        if (!data.success) {
          showError('Tsy hita ny lalao.');
          return;
        }

        // Récupérer username local (fallback)
        var myUsername  = localUser.username || localUser.uid;
        var oppUsername = data.opponentUsername || '???';

        // Afficher la barre joueurs
        renderPlayersBar(myColor, myUsername, oppUsername);

        // Dessiner le plateau avec orientation correcte
        drawPieces(data.pieces, myColor);

        // Afficher le plateau
        document.getElementById('game-board').style.display = 'block';
        document.getElementById('loading-overlay').classList.add('hidden');

      } catch(err) {
        showError('Nisy olana: ' + err.message);
      }
    }

    init();
  })();
  </script>
</body>
</html>
