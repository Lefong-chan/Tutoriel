<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tompon-daka - Lalao</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; text-align: center; background: #0092FF; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .flipped { transform: rotate(180deg); }
    .grid-line { stroke: #333; stroke-width: 2; }
    .piece-group { transition: transform 0.2s ease-in-out; }
    .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece { stroke: #ADFF2F; stroke-width: 5px; paint-order: stroke; }
    .blocked-piece { stroke: #FF4500; stroke-width: 5px; paint-order: stroke; }
    .capture-target { stroke: darkorange; stroke-width: 5px; cursor: pointer; pointer-events: all !important; stroke-dasharray: 5; animation: dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: 10; } }
    .spot { cursor: pointer; pointer-events: all; }
    .cross-line { stroke: white; stroke-width: 2; stroke-linecap: round; pointer-events: none; }
    .guide-dot { fill: #FFF700; opacity: 0.8; pointer-events: none; }
    #stop-move-btn { width: 60px; height: 60px; border-radius: 50%; background: #f44336; color: white; border: 4px solid white; font-size: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; opacity: 0.3; transition: 0.3s; pointer-events: none; }
    #stop-move-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); pointer-events: all; }
    #info-box { color: white; margin-bottom: 10px; font-weight: bold; }

    /* ── Status row: turn label + spinner + error side by side ── */
    #status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #turn-display { margin: 0; font-size: 1.3em; }

    .loading-spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .loading-spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      display: none;
      align-items: flex-start;
      gap: 7px;
      background: rgba(0,0,0,0.38);
      border: 1.5px solid rgba(255,80,80,0.6);
      border-radius: 10px;
      padding: 7px 13px;
      font-size: 0.8em;
      color: #fff;
      max-width: 260px;
      text-align: left;
      line-height: 1.45;
    }
    #error-box.visible { display: flex; }
    #error-icon { font-size: 1.15em; flex-shrink: 0; margin-top: 1px; }
    #error-text { word-break: break-word; font-weight: 600; }
    #retry-info { font-size: 0.88em; color: rgba(255,255,255,0.65); margin-top: 2px; font-weight: 400; }
  </style>
</head>
<body>

  <div id="info-box">
    <div id="status-row">
      <h2 id="turn-display">Mampiditra...</h2>
      <span class="loading-spinner" id="init-spinner"></span>
      <div id="error-box">
        <span id="error-icon">⚠️</span>
        <div>
          <div id="error-text"></div>
          <div id="retry-info"></div>
        </div>
      </div>
    </div>
  </div>

  <svg id="game-board" viewBox="-50 -50 500 300">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>
    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200 M0 0 L200 200 M100 0 L0 100 M100 0 L300 200 M200 0 L0 200 M200 0 L400 200 M300 0 L100 200 M300 0 L400 100 M400 0 L200 200 M0 100 L100 200 M400 100 L300 200"/>
    <g id="spots-group"></g>
    <g id="guides-group"></g>
    <g id="pieces-group"></g>
  </svg>

  <button id="stop-move-btn">OK</button>

  <script>
    var GAME_API_URL = '/api/game';

    var urlParams = new URLSearchParams(window.location.search);
    var gameId    = urlParams.get('gameId');
    var myColor   = urlParams.get('color');

    var currentUser = null;
    (function checkSession() {
      var stored = localStorage.getItem('user');
      if (!stored || !gameId || !myColor) { window.location.href = 'dashboard.html'; return; }
      try { currentUser = JSON.parse(stored); } catch(e) { window.location.href = 'dashboard.html'; return; }
      if (!currentUser || !currentUser.uid) { window.location.href = 'dashboard.html'; return; }
      initGame();
    })();

    var ROWS = ['A','B','C','D','E'];
    var COLS = ['1','2','3','4','5','6','7','8','9'];

    var ALLOWED_MOVES = {
      'A1':['A2','B1','B2'],'A2':['A1','A3','B2'],'A3':['A2','A4','B2','B3','B4'],
      'A4':['A3','A5','B4'],'A5':['A4','A6','B4','B5','B6'],'A6':['A5','A7','B6'],
      'A7':['A6','A8','B6','B7','B8'],'A8':['A7','A9','B8'],'A9':['A8','B8','B9'],
      'B1':['A1','B2','C1'],'B2':['A1','A2','A3','B1','B3','C1','C2','C3'],'B3':['A3','B2','B4','C3'],
      'B4':['A3','A4','A5','B3','B5','C3','C4','C5'],'B5':['A5','B4','B6','C5'],'B6':['A5','A6','A7','B5','B7','C5','C6','C7'],
      'B7':['A7','B6','B8','C7'],'B8':['A7','A8','A9','B7','B9','C7','C8','C9'],'B9':['A9','B8','C9'],
      'C1':['B1','B2','C2','D1','D2'],'C2':['B2','C1','C3','D2'],'C3':['B2','B3','B4','C2','C4','D2','D3','D4'],
      'C4':['B4','C3','C5','D4'],'C5':['B4','B5','B6','C4','C6','D4','D5','D6'],'C6':['B6','C5','C7','D6'],
      'C7':['B6','B7','B8','C6','C8','D6','D7','D8'],'C8':['B8','C7','C9','D8'],'C9':['B8','B9','C8','D8','D9'],
      'D1':['C1','D2','E1'],'D2':['C1','C2','C3','D1','D3','E1','E2','E3'],'D3':['C3','D2','D4','E3'],
      'D4':['C3','C4','C5','D3','D5','E3','E4','E5'],'D5':['C5','D4','D6','E5'],'D6':['C5','C6','C7','D5','D7','E5','E6','E7'],
      'D7':['C7','D6','D8','E7'],'D8':['C7','C8','C9','D7','D9','E7','E8','E9'],'D9':['C9','D8','E9'],
      'E1':['D1','D2','E2'],'E2':['D2','E1','E3'],'E3':['D2','D3','D4','E2','E4'],
      'E4':['D4','E3','E5'],'E5':['D4','D5','D6','E4','E6'],'E6':['D6','E5','E7'],
      'E7':['D6','D7','D8','E6','E8'],'E8':['D8','E7','E9'],'E9':['D8','D9','E8'],
    };

    var selectedSpot    = null;
    var lastBlockedSpot = null;
    var piecesOnBoard   = {};
    var _pollTimer      = null;
    var _lastDataStr    = '';
    var _busy           = false;

    // ── UI refs ───────────────────────────────────────────────────
    var _spinnerEl   = document.getElementById('init-spinner');
    var _errorBox    = document.getElementById('error-box');
    var _errorText   = document.getElementById('error-text');
    var _retryInfo   = document.getElementById('retry-info');
    var _turnDisplay = document.getElementById('turn-display');

    function showError(msg, sub) {
      _errorText.textContent = msg;
      _retryInfo.textContent = sub || '';
      _errorBox.classList.add('visible');
    }
    function hideError() { _errorBox.classList.remove('visible'); }
    function hideSpinner() { _spinnerEl.classList.add('hidden'); }

    // ── API helper ────────────────────────────────────────────────
    async function callGameApi(action, payload) {
      var r = await fetch(GAME_API_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(Object.assign({ action }, payload))
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Game error.');
      return d;
    }

    // ── Init avec retry + affichage erreur ────────────────────────
    async function initGame() {
      drawBoardSpots();
      var maxRetry = 10;
      var attempts = 0;

      async function tryInit() {
        try {
          var data = await callGameApi('get-state', { uid: currentUser.uid, gameId: gameId });

          if (!data.success || !data.pieces || Object.keys(data.pieces).length === 0) {
            attempts++;
            if (attempts < maxRetry) {
              showError(
                !data.success
                  ? (data.error || 'Partie introuvable...')
                  : 'Plateau en cours de création...',
                'Tentative ' + attempts + '/' + maxRetry
              );
              setTimeout(tryInit, 900);
            } else {
              hideSpinner();
              showError(
                !data.success
                  ? ('Erreur: ' + (data.error || 'partie introuvable'))
                  : 'Plateau introuvable après ' + maxRetry + ' tentatives.',
                'Revenez au dashboard et réessayez.'
              );
            }
            return;
          }

          // ✅ Miasa tsara → manomboka ny lalao
          hideError();
          hideSpinner();
          myColor = data.myColor;
          if (myColor === 'mena') document.getElementById('game-board').classList.add('flipped');
          _lastDataStr = JSON.stringify(data);
          applyGameState(data);
          startPolling();

        } catch(e) {
          attempts++;
          if (attempts < maxRetry) {
            showError(
              'Erreur réseau: ' + (e.message || 'connexion échouée'),
              'Tentative ' + attempts + '/' + maxRetry
            );
            setTimeout(tryInit, 900);
          } else {
            hideSpinner();
            showError(
              'Erreur: ' + (e.message || 'connexion impossible'),
              'Vérifiez votre connexion et revenez au dashboard.'
            );
          }
        }
      }

      tryInit();
    }

    // ── Polling get-state (toutes les 800ms) ─────────────────────
    function startPolling() {
      if (_pollTimer) clearInterval(_pollTimer);
      _pollTimer = setInterval(fetchAndApply, 800);
    }

    async function fetchAndApply() {
      try {
        var data = await callGameApi('get-state', { uid: currentUser.uid, gameId: gameId });
        if (!data.success) return;
        var str = JSON.stringify(data);
        if (str === _lastDataStr) return;
        _lastDataStr = str;
        applyGameState(data);
      } catch(e) {}
    }

    // ── Appliquer l'état reçu du serveur ─────────────────────────
    function applyGameState(data) {
      var display  = _turnDisplay;
      var stopBtn  = document.getElementById('stop-move-btn');
      var isMyTurn = data.turn === myColor;

      if (isMyTurn) {
        display.innerText = "ANJARANAO"; display.style.color = "#ADFF2F";
        if (data.movingPiece) {
          selectedSpot = data.movingPiece;
          stopBtn.classList.add('active');
        } else {
          if (!data.pendingCaptures) selectedSpot = null;
          stopBtn.classList.remove('active');
        }
        if (data.pendingCaptures) {
          renderPieces(data.pieces, data);
          renderCapturePending(data.pendingCaptures, data.pieces);
          return;
        }
        if (selectedSpot) renderGuides(selectedSpot, data);
        else document.getElementById('guides-group').innerHTML = "";
      } else {
        display.innerText = "Miandry ny hafa..."; display.style.color = "white";
        selectedSpot = null; lastBlockedSpot = null;
        stopBtn.classList.remove('active');
        document.getElementById('guides-group').innerHTML = "";
      }
      renderPieces(data.pieces, data);
    }

    // ── drawBoardSpots ────────────────────────────────────────────
    function drawBoardSpots() {
      var grp = document.getElementById('spots-group');
      grp.innerHTML = "";
      ROWS.forEach(function(r, ri) {
        COLS.forEach(function(c, ci) {
          var circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", ci * 50); circle.setAttribute("cy", ri * 50);
          circle.setAttribute("r", 22); circle.setAttribute("fill", "transparent");
          circle.setAttribute("class", "spot");
          circle.onclick = (function(spotID){ return function(){ handleSpotClick(spotID); }; })(r + c);
          grp.appendChild(circle);
        });
      });
    }

    // ── handleSpotClick ───────────────────────────────────────────
    async function handleSpotClick(spotID) {
      if (_busy) return;
      _busy = true;
      try {
        if (!selectedSpot || spotID === selectedSpot) {
          var state = await callGameApi('get-state', { uid: currentUser.uid, gameId: gameId });
          if (!state.success || state.turn !== myColor || state.pendingCaptures) { _busy = false; return; }
          if (state.pieces[spotID] === myColor) {
            selectedSpot = spotID; lastBlockedSpot = null;
          } else {
            selectedSpot = null; lastBlockedSpot = spotID;
          }
          renderGuides(selectedSpot || "", state);
          renderPieces(state.pieces, state);
          _busy = false; return;
        }

        var res = await callGameApi('move', {
          uid:    currentUser.uid,
          gameId: gameId,
          from:   selectedSpot,
          to:     spotID
        });

        if (res.needChooseCapture) {
          selectedSpot = spotID;
        } else {
          selectedSpot = res.continueTurn ? spotID : null;
          lastBlockedSpot = null;
        }
        await fetchAndApply();
      } catch(e) {
        selectedSpot = null; lastBlockedSpot = null;
        await fetchAndApply();
      } finally {
        _busy = false;
      }
    }

    // ── renderCapturePending ──────────────────────────────────────
    function renderCapturePending(pendingCaptures, pieces) {
      for (var spot in pieces) {
        var g = piecesOnBoard[spot] && piecesOnBoard[spot].el;
        if (!g) continue;
        var circle = g.querySelector('circle');
        if (!circle) continue;
        var isApp  = pendingCaptures.approach.includes(spot);
        var isWith = pendingCaptures.withdrawal.includes(spot);
        g.querySelectorAll('.cross-line').forEach(function(l){ l.remove(); });
        if (isApp || isWith) {
          circle.classList.add("capture-target");
          circle.style.pointerEvents = "all";
          var captureType = isApp ? 'approach' : 'withdrawal';
          circle.onclick = (function(t){ return function(e){
            e.stopPropagation();
            sendChooseCapture(t);
          }; })(captureType);
          g.appendChild(createCross(-5,-5,5,5));
          g.appendChild(createCross(5,-5,-5,5));
        }
      }
    }

    async function sendChooseCapture(type) {
      if (_busy) return;
      _busy = true;
      try {
        await callGameApi('choose-capture', { uid: currentUser.uid, gameId: gameId, type: type });
        await fetchAndApply();
      } catch(e) { await fetchAndApply(); }
      finally { _busy = false; }
    }

    // ── renderGuides ──────────────────────────────────────────────
    function renderGuides(startSpot, gameData) {
      var grp = document.getElementById('guides-group');
      grp.innerHTML = "";
      if (!startSpot) return;
      var pieces  = gameData.pieces;
      var visited = gameData.visited || [];
      var moves   = ALLOWED_MOVES[startSpot] || [];
      moves.forEach(function(target) {
        if (pieces[target] || visited.includes(target)) return;
        var dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", COLS.indexOf(target[1]) * 50);
        dot.setAttribute("cy", ROWS.indexOf(target[0]) * 50);
        dot.setAttribute("r", 6);
        dot.setAttribute("class", "guide-dot");
        grp.appendChild(dot);
      });
    }

    // ── renderPieces ──────────────────────────────────────────────
    function renderPieces(pieces, gameData) {
      var grp      = document.getElementById('pieces-group');
      var isMyTurn = gameData.turn === myColor;
      var newPiecesOnBoard = {};
      var vanished = Object.keys(piecesOnBoard).filter(function(k){ return !pieces[k]; });
      var appeared = Object.keys(pieces).filter(function(k){ return !piecesOnBoard[k]; });

      vanished.forEach(function(vKey) {
        var color  = piecesOnBoard[vKey].color;
        var target = appeared.find(function(aKey){ return pieces[aKey] === color; });
        if (target) {
          newPiecesOnBoard[target] = piecesOnBoard[vKey];
          appeared = appeared.filter(function(a){ return a !== target; });
        } else {
          piecesOnBoard[vKey].el.remove();
        }
      });

      appeared.forEach(function(aKey) {
        var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "piece-group");
        var c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("r", 8);
        g.appendChild(c);
        grp.appendChild(g);
        newPiecesOnBoard[aKey] = { el: g, color: pieces[aKey] };
      });

      Object.keys(pieces).forEach(function(k) {
        if (!newPiecesOnBoard[k]) newPiecesOnBoard[k] = piecesOnBoard[k];
      });
      piecesOnBoard = newPiecesOnBoard;

      for (var spot in pieces) {
        var ri = ROWS.indexOf(spot[0]), ci = COLS.indexOf(spot[1]);
        var g      = piecesOnBoard[spot].el;
        var circle = g.querySelector('circle');
        g.setAttribute("transform", "translate(" + (ci*50) + ", " + (ri*50) + ")");
        circle.setAttribute("fill", "url(#" + pieces[spot] + "-pat)");
        circle.removeAttribute("class");
        circle.style.pointerEvents = "none";
        g.querySelectorAll('.cross-line').forEach(function(l){ l.remove(); });

        if (isMyTurn && pieces[spot] === myColor && !gameData.pendingCaptures) {
          if (selectedSpot === spot)         circle.setAttribute("class", "selected-piece");
          else if (lastBlockedSpot === spot) circle.setAttribute("class", "blocked-piece");
          else if (!gameData.movingPiece)    circle.setAttribute("class", "movable-piece");
        }
      }
    }

    function createCross(x1, y1, x2, y2) {
      var l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", x1); l.setAttribute("y1", y1);
      l.setAttribute("x2", x2); l.setAttribute("y2", y2);
      l.setAttribute("class", "cross-line");
      return l;
    }

    // ── Bouton OK (stop-move) ─────────────────────────────────────
    document.getElementById('stop-move-btn').onclick = async function() {
      if (_busy) return;
      _busy = true;
      try {
        await callGameApi('stop-move', { uid: currentUser.uid, gameId: gameId });
        selectedSpot = null; lastBlockedSpot = null;
        await fetchAndApply();
      } catch(e) { await fetchAndApply(); }
      finally { _busy = false; }
    };
  </script>
</body>
</html>
