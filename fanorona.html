<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ── Bande joueurs ── */
    #players-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 800px;
      margin-bottom: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      color: white;
      font-size: 1em;
      font-weight: 700;
      min-height: 44px;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.6);
    }
    .dot-maintso { background: #22c55e; }
    .dot-mena    { background: #ef4444; }
    .player-name { font-size: 0.95em; }
    .player-label {
      font-size: 0.7em;
      font-weight: 400;
      opacity: 0.75;
      margin-left: 2px;
    }
    .vs-sep {
      font-size: 0.85em;
      opacity: 0.6;
      font-weight: 400;
    }

    /* ── Plateau ── */
    #game-board {
      width: 95vw;
      max-width: 800px;
      max-height: 75vh;
      display: block;
    }
    .grid-line { stroke: #333; stroke-width: 2; }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0092FF;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      font-size: 1.2em;
      font-weight: 700;
      flex-direction: column;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Erreur ── */
    #error-msg {
      display: none;
      color: #fef08a;
      font-size: 1em;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>Fananganana ny lalao…</span>
  </div>

  <!-- Bande joueurs -->
  <div id="players-bar" style="display:none;">
    <!-- rempli par JS -->
  </div>

  <!-- Plateau SVG -->
  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>

    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
      M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
      M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
      M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
      M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
      M300 0 L400 100 M400 0 L200 200
      M0 100 L100 200 M400 100 L300 200"/>

    <g id="pieces-group"></g>
  </svg>

  <div id="error-msg"></div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, get, set, onValue, update } from "firebase/database";

  // --- Configuration Firebase ---
  const firebaseConfig = {
    apiKey: "AIzaSyDMr3plGs8sF56pM_O3jYqfGdWTlJiePW0",
    authDomain: "tutoriel-ff487.firebaseapp.com",
    projectId: "tutoriel-ff487",
    appId: "1:128298277579:web:9a7fb395621c448e7f594e",
    databaseURL: "https://tutoriel-ff487-default-rtdb.firebaseio.com",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // --- Paramètres URL ---
  const urlParams = new URLSearchParams(window.location.search);
  const gameID = urlParams.get('gameId');
  const myColor = urlParams.get('color');
  const SESSION_API_URL = '/api/session';

  // --- Lojika Fanorona ---
  const rows = ['A','B','C','D','E'], cols = ['1','2','3','4','5','6','7','8','9'];
  let selectedSpot = null, lastBlockedSpot = null, canChangePiece = true;
  let piecesOnBoard = {};
  let pendingCaptures = { approach: [], withdrawal: [], moveData: null, newVisited: [] };

  const allowedMoves = {
    'A1': ['A2','B1','B2'], 'A2': ['A1','A3','B2'], 'A3': ['A2','A4','B2','B3','B4'],
    'A4': ['A3','A5','B4'], 'A5': ['A4','A6','B4','B5','B6'], 'A6': ['A5','A7','B6'],
    'A7': ['A6','A8','B6','B7','B8'], 'A8': ['A7','A9','B8'], 'A9': ['A8','B8','B9'],
    'B1': ['A1','B2','C1'], 'B2': ['A1','A2','A3','B1','B3','C1','C2','C3'], 'B3': ['A3','B2','B4','C3'],
    'B4': ['A3','A4','A5','B3','B5','C3','C4','C5'], 'B5': ['A5','B4','B6','C5'], 'B6': ['A5','A6','A7','B5','B7','C5','C6','C7'],
    'B7': ['A7','B6','B8','C7'], 'B8': ['A7','A8','A9','B7','B9','C7','C8','C9'], 'B9': ['A9','B8','C9'],
    'C1': ['B1','B2','C2','D1','D2'], 'C2': ['B2','C1','C3','D2'], 'C3': ['B2','B3','B4','C2','C4','D2','D3','D4'],
    'C4': ['B4','C3','C5','D4'], 'C5': ['B4','B5','B6','C4','C6','D4','D5','D6'], 'C6': ['B6','C5','C7','D6'],
    'C7': ['B6','B7','B8','C6','C8','D6','D7','D8'], 'C8': ['B8','C7','C9','D8'], 'C9': ['B8','B9','C8','D8','D9'],
    'D1': ['C1','D2','E1'], 'D2': ['C1','C2','C3','D1','D3','E1','E2','E3'], 'D3': ['C3','D2','D4','E3'],
    'D4': ['C3','C4','C5','D3','D5','E3','E4','E5'], 'D5': ['C5','D4','D6','E5'], 'D6': ['C5','C6','C7','D5','D7','E5','E6','E7'],
    'D7': ['C7','D6','D8','E7'], 'D8': ['C7','C8','C9','D7','D9','E7','E8','E9'], 'D9': ['C9','D8','E9'],
    'E1': ['D1','D2','E2'], 'E2': ['D2','E1','E3'], 'E3': ['D2','D3','D4','E2','E4'],
    'E4': ['D4','E3','E5'], 'E5': ['D4','D5','D6','E4','E6'], 'E6': ['D6','E5','E7'],
    'E7': ['D6','D7','D8','E6','E8'], 'E8': ['D8','E7','E9'], 'E9': ['D8','D9','E8'],
  };

  // --- Initialization ---
  onAuthStateChanged(auth, async (user) => {
    if (user && gameID) {
      // Ampiana ireto element ireto raha tsy misy ao amin'ny HTML
      ensureUIElements();
      await initGameFromSession(user);
    } else {
      showError("Tsy hita ny mombamomba anao (User) na ny gameID.");
    }
  });

  function ensureUIElements() {
    const svg = document.getElementById('game-board');
    if (!svg.querySelector('#spots-group')) {
      const gSpots = document.createElementNS("http://www.w3.org/2000/svg", "g");
      gSpots.id = "spots-group";
      svg.appendChild(gSpots);
    }
    if (!svg.querySelector('#guides-group')) {
      const gGuides = document.createElementNS("http://www.w3.org/2000/svg", "g");
      gGuides.id = "guides-group";
      svg.appendChild(gGuides);
    }
    // Ampiana display ho an'ny Turn raha tsy misy
    if (!document.getElementById('turn-display')) {
      const div = document.createElement('div');
      div.id = 'turn-display';
      div.style.cssText = "color:white; margin:10px; font-weight:bold;";
      document.body.insertBefore(div, svg);
    }
  }

  async function initGameFromSession(localUser) {
    try {
      const r = await fetch(SESSION_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get-fanorona-game', uid: localUser.uid, gameId: gameID })
      });
      const data = await r.json();

      if (!data.success) throw new Error("Tsy hita ny lalao.");

      renderPlayersBar(myColor, localUser.displayName || localUser.email.split('@')[0], data.opponentUsername);
      drawBoardSpots();
      watchGame();

      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('game-board').style.display = 'block';

    } catch (err) {
      showError(err.message);
    }
  }

  function renderPlayersBar(myCol, myName, oppName) {
    const bar = document.getElementById('players-bar');
    const myDot = myCol === 'maintso' ? 'dot-maintso' : 'dot-mena';
    const oppDot = myCol === 'maintso' ? 'dot-mena' : 'dot-maintso';
    bar.innerHTML = `
      <div class="player-info"><div class="player-dot ${oppDot}"></div><span>${oppName}</span></div>
      <span class="vs-sep">VS</span>
      <div class="player-info"><span>${myName}</span><div class="player-dot ${myDot}"></div></div>`;
    bar.style.display = 'flex';
  }

  function drawBoardSpots() {
    const grp = document.getElementById('spots-group');
    grp.innerHTML = "";
    rows.forEach((r, ri) => {
      cols.forEach((c, ci) => {
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", ci * 50); circle.setAttribute("cy", ri * 50);
        circle.setAttribute("r", 20); circle.setAttribute("fill", "transparent");
        circle.style.cursor = "pointer";
        circle.onclick = () => handleSpotClick(r + c);
        grp.appendChild(circle);
      });
    });
  }

  function watchGame() {
    onValue(ref(db, 'games/' + gameID), (snap) => {
      const data = snap.val();
      if (!data) return;
      
      const display = document.getElementById('turn-display');
      if (data.turn === myColor) {
        display.innerText = "ANJARANAO";
        if (data.movingPiece) { selectedSpot = data.movingPiece; canChangePiece = false; }
        else { canChangePiece = true; }
        if (selectedSpot) renderGuides(selectedSpot, data);
      } else {
        display.innerText = "Miandry ny adversaire...";
        selectedSpot = null;
        document.getElementById('guides-group').innerHTML = "";
      }
      renderPieces(data.pieces, data);
    });
  }

  function renderPieces(pieces, gameData) {
    const grp = document.getElementById('pieces-group');
    grp.innerHTML = "";
    for (let spot in pieces) {
      const ri = rows.indexOf(spot[0]), ci = cols.indexOf(spot[1]);
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("transform", `translate(${ci * 50}, ${ri * 50})`);
      
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("r", 15);
      c.setAttribute("fill", `url(#${pieces[spot]}-pat)`);
      
      if (gameData.turn === myColor && spot === selectedSpot) {
        c.setAttribute("stroke", "yellow"); c.setAttribute("stroke-width", "3");
      }
      
      g.appendChild(c);
      grp.appendChild(g);
    }
  }

  function renderGuides(startSpot, gameData) {
    const grp = document.getElementById('guides-group');
    grp.innerHTML = "";
    const moves = allowedMoves[startSpot] || [];
    moves.forEach(target => {
      if (gameData.pieces[target]) return;
      const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dot.setAttribute("cx", cols.indexOf(target[1]) * 50);
      dot.setAttribute("cy", rows.indexOf(target[0]) * 50);
      dot.setAttribute("r", 5); dot.setAttribute("fill", "rgba(255,255,255,0.5)");
      grp.appendChild(dot);
    });
  }

  async function handleSpotClick(spotID) {
    const snap = await get(ref(db, 'games/' + gameID));
    const data = snap.val();
    if (!data || data.turn !== myColor) return;

    if (data.pieces[spotID] === myColor) {
      if (canChangePiece) {
        selectedSpot = spotID;
        renderGuides(selectedSpot, data);
        renderPieces(data.pieces, data);
      }
      return;
    }

    if (selectedSpot && (allowedMoves[selectedSpot]||[]).includes(spotID) && !data.pieces[spotID]) {
      // Lojika tsotra hifindra toerana
      const newPieces = {...data.pieces};
      delete newPieces[selectedSpot];
      newPieces[spotID] = myColor;
      
      // Update Firebase
      await update(ref(db, 'games/' + gameID), {
        pieces: newPieces,
        turn: myColor === 'maintso' ? 'mena' : 'maintso',
        movingPiece: ""
      });
      selectedSpot = null;
    }
  }

  function showError(msg) {
    const errBox = document.getElementById('error-msg');
    errBox.innerText = msg; errBox.style.display = 'block';
    document.getElementById('loading-overlay').classList.add('hidden');
  }
</script>

</body>
</html>
