<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* ── Bande joueurs ── */
    #players-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 800px;
      margin-bottom: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      color: white;
      font-size: 1em;
      font-weight: 700;
      min-height: 44px;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.6);
    }
    .dot-maintso { background: #22c55e; }
    .dot-mena    { background: #ef4444; }
    .player-name { font-size: 0.95em; }
    .player-label {
      font-size: 0.7em;
      font-weight: 400;
      opacity: 0.75;
      margin-left: 2px;
    }
    .vs-sep {
      font-size: 0.85em;
      opacity: 0.6;
      font-weight: 400;
    }

    /* ── Plateau ── */
    #game-board {
      width: 95vw;
      max-width: 800px;
      max-height: 75vh;
      display: block;
    }
    .grid-line { stroke: #333; stroke-width: 2; }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0092FF;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      font-size: 1.2em;
      font-weight: 700;
      flex-direction: column;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Erreur ── */
    #error-msg {
      display: none;
      color: #fef08a;
      font-size: 1em;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>Fananganana ny lalao…</span>
  </div>

  <!-- Bande joueurs -->
  <div id="players-bar" style="display:none;">
    <!-- rempli par JS -->
  </div>

  <!-- Plateau SVG -->
  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>

    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
      M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
      M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
      M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
      M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
      M300 0 L400 100 M400 0 L200 200
      M0 100 L100 200 M400 100 L300 200"/>

    <g id="pieces-group"></g>
  </svg>

  <div id="error-msg"></div>

  <script>
(function() {
  
  const GAME_API_URL = "/api/game"
  
  var params = new URLSearchParams(window.location.search)
  
  var gameId = params.get("gameId")
  var myColor = params.get("color")
  
  var rows = ['A', 'B', 'C', 'D', 'E']
  var cols = ['1', '2', '3', '4', '5', '6', '7', '8', '9']
  
  var selectedSpot = null
  var gameState = null
  
  function callGameApi(action, payload) {
    
    return fetch(GAME_API_URL, {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action }, payload))
      })
      .then(r => r.json())
    
  }
  
  function getSpotFromXY(x, y) {
    
    let ci = Math.round(x / 50)
    let ri = Math.round(y / 50)
    
    if (ci < 0 || ci > 8 || ri < 0 || ri > 4) return null
    
    return rows[ri] + cols[ci]
    
  }
  
  function drawPieces(pieces, myCol) {
    
    var grp = document.getElementById("pieces-group")
    
    grp.innerHTML = ""
    
    var flip = (myCol === "mena")
    
    for (let spot in pieces) {
      
      let ri = rows.indexOf(spot[0])
      let ci = cols.indexOf(spot[1])
      
      let color = pieces[spot]
      
      let svgX = ci * 50
      let svgY = flip ? (4 - ri) * 50 : ri * 50
      
      let g = document.createElementNS("http://www.w3.org/2000/svg", "g")
      
      g.setAttribute("transform", "translate(" + svgX + "," + svgY + ")")
      
      let circle = document.createElementNS("http://www.w3.org/2000/svg", "circle")
      
      circle.setAttribute("r", "12")
      circle.setAttribute("fill", "url(#" + color + "-pat)")
      
      if (color === myColor) {
        
        circle.style.cursor = "pointer"
        
        circle.onclick = function(e) {
          
          e.stopPropagation()
          
          selectPiece(spot)
          
        }
        
      }
      
      g.appendChild(circle)
      
      grp.appendChild(g)
      
    }
    
  }
  
  function selectPiece(spot) {
    
    if (gameState.turn !== myColor) return
    
    if (gameState.pieces[spot] !== myColor) return
    
    selectedSpot = spot
    
  }
  
  async function movePiece(target) {
    
    if (!selectedSpot) return
    
    let r = await callGameApi("move", {
      gameId: gameId,
      origin: selectedSpot,
      target: target
    })
    
    if (r.error) {
      
      console.log(r.error)
      
    } else {
      
      selectedSpot = null
      
      await loadGame()
      
    }
    
  }
  
  async function loadGame() {
    
    let r = await callGameApi("get", { gameId })
    
    if (!r.success) return
    
    gameState = r.data
    
    drawPieces(gameState.pieces, myColor)
    
  }
  
  function setupBoardClick() {
    
    let board = document.getElementById("game-board")
    
    board.addEventListener("click", function(e) {
      
      let pt = board.createSVGPoint()
      
      pt.x = e.clientX
      pt.y = e.clientY
      
      let svgP = pt.matrixTransform(board.getScreenCTM().inverse())
      
      let spot = getSpotFromXY(svgP.x, svgP.y)
      
      if (!spot) return
      
      movePiece(spot)
      
    })
    
  }
  
  async function init() {
    
    await callGameApi("init", { gameId })
    
    setupBoardClick()
    
    await loadGame()
    
    setInterval(loadGame, 1500)
    
  }
  
  init()
  
})()
  </script>
</body>
</html>
