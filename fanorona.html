<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona - Lalao</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .flipped { transform: rotate(180deg); }
    .grid-line { stroke: #333; stroke-width: 2; }
    .piece-group { transition: transform 0.2s ease-in-out; }
    .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece { stroke: #ADFF2F; stroke-width: 5px; paint-order: stroke; }
    .blocked-piece { stroke: #FF4500; stroke-width: 5px; paint-order: stroke; }
    .capture-target { stroke: darkorange; stroke-width: 5px; cursor: pointer; pointer-events: all !important; stroke-dasharray: 5; animation: dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: 10; } }
    .spot { cursor: pointer; pointer-events: all; }
    .lock-board .spot { pointer-events: none !important; }
    .cross-line { stroke: white; stroke-width: 2; stroke-linecap: round; pointer-events: none; }
    .guide-dot { fill: #FFF700; opacity: 0.8; pointer-events: none; }

    #players-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 800px;
      margin-bottom: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      color: white;
      font-size: 1em;
      font-weight: 700;
      min-height: 44px;
    }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.6); }
    .dot-maintso { background: #22c55e; }
    .dot-mena    { background: #ef4444; }
    .player-name { font-size: 0.95em; }
    .player-label { font-size: 0.7em; font-weight: 400; opacity: 0.75; margin-left: 2px; }
    .vs-sep { font-size: 0.85em; opacity: 0.6; font-weight: 400; }

    #info-box { color: white; margin-bottom: 10px; font-weight: bold; }
    #turn-display { margin: 0; }

    #stop-move-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #f44336;
      color: white;
      border: 4px solid white;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      opacity: 0.3;
      transition: 0.3s;
      pointer-events: none;
    }
    #stop-move-btn.active {
      opacity: 1;
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
      pointer-events: all;
    }

    #game-board {
      width: 95vw;
      max-width: 800px;
      max-height: 75vh;
      display: block;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0092FF;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      font-size: 1.2em;
      font-weight: 700;
      flex-direction: column;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      color: #fef08a;
      font-size: 1em;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>Fananganana ny lalao…</span>
  </div>

  <div id="players-bar" style="display:none;"></div>
  <div id="info-box"><h2 id="turn-display">Mampiditra...</h2></div>

  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>
    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200 M0 0 L200 200 M100 0 L0 100 M100 0 L300 200 M200 0 L0 200 M200 0 L400 200 M300 0 L100 200 M300 0 L400 100 M400 0 L200 200 M0 100 L100 200 M400 100 L300 200"/>
    <g id="spots-group"></g>
    <g id="guides-group"></g>
    <g id="pieces-group"></g>
  </svg>

  <button id="stop-move-btn">OK</button>
  <div id="error-msg"></div>

<script>
(function() {
  // ... (mitovy ny voalohany: SESSION_API_URL, GAME_API_URL, POLL_INTERVAL, params, gameId, myColor, rows, cols, allowedMoves)
  // Kopia ireo mety ilaina avy amin'ny kaodyo anao (allowedMoves, helper functions) tsotra toy izao:
  const SESSION_API_URL = '/api/session';
  const GAME_API_URL = '/api/game';
  const POLL_INTERVAL = 2000;

  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('gameId');
  const myColor = params.get('color');

  const rows = ['A','B','C','D','E'];
  const cols = ['1','2','3','4','5','6','7','8','9'];

  const allowedMoves = { /* copy allowedMoves from your code */ };

  // copy helper functions: getCaptures, playerHasAnyCapture, canPieceMove, checkAvailableCaptures
  // ...

  // Utility: generate a simple UUID v4 (no deps)
  function uuidv4() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = (Math.random() * 16) | 0;
      const v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  let currentGame = null;
  let selectedSpot = null;
  let lastBlockedSpot = null;
  let canChangePiece = true;
  let myUid = null;
  let myUsername = null;
  let opponentUsername = null;

  // NEW: tracking optimistic client move state
  let localMoveInProgress = false;
  let localPendingClientMove = null;
  let localPendingOldGame = null; // backup to revert if server fails

  function showError(msg) {
    const el = document.getElementById('error-msg');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }

  async function callSessionApi(action, payload) {
    try {
      const res = await fetch(SESSION_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
      return await res.json();
    } catch (e) { return { success: false }; }
  }

  async function callGameApi(action, payload) {
    try {
      const res = await fetch(GAME_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
      return await res.json();
    } catch (e) { return { success: false }; }
  }

  // ... drawSpots, renderPieces, renderGuides, renderPlayersBar, escapeHtml (same as original) ...

  function updateUI() {
    if (!currentGame) return;
    const turnDisplay = document.getElementById('turn-display');
    const stopBtn = document.getElementById('stop-move-btn');

    const isMyTurn = currentGame.turn === myColor;

    // If a localMoveInProgress exists, we SHOULD NOT flip the UI turn away from the player
    // until server confirms. We'll use currentGame._optimisticTurnChecked flag to know if server confirmed.
    if (localMoveInProgress) {
      // keep player's view that it's still their turn if movingPiece exists optimistically
      if (currentGame.movingPiece) {
        turnDisplay.innerText = 'ANJARANAO';
        turnDisplay.style.color = '#ADFF2F';
        canChangePiece = false;
        stopBtn.classList.add('active');
      } else {
        // if movingPiece was set to null optimistically but we are waiting, keep as waiting state
        turnDisplay.innerText = 'Alefaso ny serveur...';
        turnDisplay.style.color = '#FFD580';
        stopBtn.classList.remove('active');
      }
    } else {
      if (isMyTurn) {
        turnDisplay.innerText = 'ANJARANAO';
        turnDisplay.style.color = '#ADFF2F';
        if (currentGame.movingPiece) { 
          selectedSpot = currentGame.movingPiece; 
          canChangePiece = false; 
          stopBtn.classList.add('active'); 
        } else { 
          canChangePiece = true; 
          stopBtn.classList.remove('active'); 
        }
        if (selectedSpot && !currentGame.awaitingCapture) renderGuides(selectedSpot, currentGame);
        else document.getElementById('guides-group').innerHTML = '';
      } else {
        turnDisplay.innerText = 'Miandry ny hafa...';
        turnDisplay.style.color = 'white';
        selectedSpot = null; 
        lastBlockedSpot = null;
        stopBtn.classList.remove('active');
        document.getElementById('guides-group').innerHTML = '';
      }
    }
    renderPieces(currentGame);
    renderPlayersBar();
  }

  async function fetchGame() {
    if (!myUid || !gameId) return;
    const res = await fetch(GAME_API_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get-game', uid: myUid, gameId }) 
    });
    const data = await res.json();
    if (data.success && data.game) {
      const serverGame = data.game;

      // If there's a local optimistic move in progress, check if server already processed it
      if (localMoveInProgress && localPendingClientMove) {
        const processed = serverGame.processedMoves && serverGame.processedMoves[localPendingClientMove];
        if (processed) {
          // server has processed our optimistic move; replace currentGame with serverGame (authoritative)
          currentGame = serverGame;
          localMoveInProgress = false;
          localPendingClientMove = null;
          localPendingOldGame = null;
          updateUI();
          return;
        }
        // If serverGame turn changed in a way that contradicts optimistic state (e.g. server rejected),
        // revert to server state
        // We'll detect inconsistencies: if server pieces don't contain our optimistic moving piece placement, revert.
        if (localPendingOldGame && JSON.stringify(serverGame.pieces) !== JSON.stringify(localPendingOldGame.pieces)) {
          // server has differing pieces - prefer server authoritative state
          currentGame = serverGame;
          localMoveInProgress = false;
          localPendingClientMove = null;
          localPendingOldGame = null;
          updateUI();
          return;
        }
        // else: keep optimistic UI as-is until processed or rejected; but still merge non-conflicting fields:
        // update non-optimistic fields like opponent username/ids
        currentGame.senderUid = serverGame.senderUid;
        currentGame.receiverUid = serverGame.receiverUid;
        // do not overwrite pieces/turn/movingPiece/visited/lastDir/awaitingCapture/pending* if optimistic
        updateUI();
        return;
      }

      // No local optimistic move: safe to replace local game with server game
      currentGame = serverGame;
      updateUI();
    }
  }

  async function handleSpotClick(spotID) {
    if (!currentGame || currentGame.turn !== myColor || currentGame.awaitingCapture) return;
    const pieces = currentGame.pieces || {};

    if (canChangePiece && pieces[spotID] === myColor) {
      if (canPieceMove(spotID, pieces, myColor, playerHasAnyCapture(pieces, myColor))) { 
        selectedSpot = spotID; 
        lastBlockedSpot = null; 
      } else { 
        selectedSpot = null; 
        lastBlockedSpot = spotID; 
      }
      updateUI();
      return;
    }

    if (selectedSpot && (allowedMoves[selectedSpot] || []).includes(spotID) && !pieces[spotID]) {
      if ((currentGame.visited || []).includes(spotID)) return;
      
      const caps = getCaptures(pieces, selectedSpot, spotID, myColor);
      const isCap = caps.approach.length > 0 || caps.withdrawal.length > 0;
      if (playerHasAnyCapture(pieces, myColor) && !isCap) return;
      
      const r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]);
      const r2 = rows.indexOf(spotID[0]), c2 = cols.indexOf(spotID[1]);
      const dir = `${r2 - r1},${c2 - c1}`;
      if (!canChangePiece && currentGame.lastDir === dir) return;

      const origin = selectedSpot;
      const oldGame = JSON.parse(JSON.stringify(currentGame));

      // OPTIMISTIC UI: apply immediate visual change
      const clientMoveId = uuidv4();
      localMoveInProgress = true;
      localPendingClientMove = clientMoveId;
      localPendingOldGame = oldGame;

      let newVisited = [...(currentGame.visited || []), origin];
      let newPieces = { ...currentGame.pieces };
      delete newPieces[origin];
      newPieces[spotID] = myColor;

      let nextMovingPiece = spotID;
      let nextDir = dir;
      let nextAwaiting = false;
      let nextTurn = currentGame.turn;
      let pApproach = [], pWithdrawal = [];

      if (caps.approach.length > 0 && caps.withdrawal.length > 0) {
        nextAwaiting = true;
        pApproach = caps.approach;
        pWithdrawal = caps.withdrawal;
      } else if (isCap) {
        const toRem = caps.approach.length > 0 ? caps.approach : caps.withdrawal;
        toRem.forEach(s => delete newPieces[s]);
        if (!checkAvailableCaptures(newPieces, spotID, newVisited, dir, myColor)) {
          nextMovingPiece = null; nextTurn = (myColor === 'maintso' ? 'mena' : 'maintso');
        }
      } else {
        nextMovingPiece = null; nextTurn = (myColor === 'maintso' ? 'mena' : 'maintso');
      }

      currentGame.pieces = newPieces;
      currentGame.turn = nextTurn;
      currentGame.movingPiece = nextMovingPiece;
      currentGame.visited = nextMovingPiece ? newVisited : [];
      currentGame.lastDir = nextMovingPiece ? nextDir : "";
      currentGame.awaitingCapture = nextAwaiting;
      currentGame.pendingApproach = pApproach;
      currentGame.pendingWithdrawal = pWithdrawal;
      
      updateUI();

      // Send to backend with clientMoveId for idempotency
      const res = await callGameApi('make-move', { uid: myUid, gameId, origin, target: spotID, clientMoveId });
      if (!res.success) {
        // revert to old state
        currentGame = oldGame;
        localMoveInProgress = false;
        localPendingClientMove = null;
        localPendingOldGame = null;
        updateUI();
        showError('Tsy tafita ny famindrana (network/server). Naverina ny sata.');
      } else {
        // server accepted; server might respond with authoritative game state in res.game
        // We'll rely on the poller (fetchGame) to pick up processedMoves; but if server returned game update, merge it:
        if (res.game) {
          currentGame = res.game;
          localMoveInProgress = false;
          localPendingClientMove = null;
          localPendingOldGame = null;
          updateUI();
        } else {
          // otherwise wait for poll to detect processedMoves
          // keep optimistic UI until poll confirms
        }
      }
    }
  }

  async function resolveCapture(capturedSpot) {
    if (!currentGame || !currentGame.awaitingCapture) return;
    const oldGame = JSON.parse(JSON.stringify(currentGame));
    const clientMoveId = uuidv4();
    localMoveInProgress = true;
    localPendingClientMove = clientMoveId;
    localPendingOldGame = oldGame;

    const toRemove = (currentGame.pendingApproach || []).includes(capturedSpot) ? currentGame.pendingApproach : currentGame.pendingWithdrawal;
    toRemove.forEach(s => delete currentGame.pieces[s]);
    
    const further = checkAvailableCaptures(currentGame.pieces, currentGame.movingPiece, currentGame.visited, currentGame.lastDir, myColor);
    if (!further) {
      currentGame.turn = (myColor === 'maintso' ? 'mena' : 'maintso');
      currentGame.movingPiece = null;
      currentGame.visited = [];
      currentGame.lastDir = "";
    }
    currentGame.awaitingCapture = false;
    currentGame.pendingApproach = [];
    currentGame.pendingWithdrawal = [];
    
    updateUI();
    const res = await callGameApi('resolve-capture', { uid: myUid, gameId, capturedSpot, clientMoveId });
    if (!res.success) {
      currentGame = oldGame;
      localMoveInProgress = false;
      localPendingClientMove = null;
      localPendingOldGame = null;
      updateUI();
      showError('Tsy tafita ny fanafoanana capture. Naverina ny sata.');
    } else {
      if (res.game) {
        currentGame = res.game;
        localMoveInProgress = false;
        localPendingClientMove = null;
        localPendingOldGame = null;
        updateUI();
      }
    }
  }

  async function handleStopTurn() {
    if (!currentGame || currentGame.turn !== myColor || !currentGame.movingPiece) return;
    const oldGame = JSON.parse(JSON.stringify(currentGame));
    const clientMoveId = uuidv4();
    localMoveInProgress = true;
    localPendingClientMove = clientMoveId;
    localPendingOldGame = oldGame;

    currentGame.turn = (myColor === 'maintso' ? 'mena' : 'maintso');
    currentGame.movingPiece = null;
    currentGame.visited = [];
    currentGame.lastDir = "";
    updateUI();

    const res = await callGameApi('stop-turn', { uid: myUid, gameId, clientMoveId });
    if (!res.success) {
      currentGame = oldGame;
      localMoveInProgress = false;
      localPendingClientMove = null;
      localPendingOldGame = null;
      updateUI();
      showError('Tsy tafita ny famaranana fihetsika. Naverina ny sata.');
    } else {
      if (res.game) {
        currentGame = res.game;
        localMoveInProgress = false;
        localPendingClientMove = null;
        localPendingOldGame = null;
        updateUI();
      }
    }
  }

  async function init() {
    if (!gameId || !myColor) return;
    const stored = localStorage.getItem('user');
    if (!stored) { window.location.href = 'login&register.html'; return; }
    const localUser = JSON.parse(stored);
    myUid = localUser.uid;
    myUsername = localUser.username || myUid;
    
    const data = await callSessionApi('get-fanorona-game', { uid: myUid, gameId });
    if (data.success) {
      opponentUsername = data.opponentUsername;
      currentGame = { pieces: data.pieces, turn: data.turn, senderUid: data.senderUid, receiverUid: data.receiverUid, processedMoves: data.processedMoves || {} };
      document.getElementById('game-board').classList.toggle('flipped', myColor === 'mena');
      drawSpots();
      updateUI();
      document.getElementById('game-board').style.display = 'block';
      document.getElementById('loading-overlay').classList.add('hidden');
      
      setInterval(fetchGame, POLL_INTERVAL);
    }
  }

  document.getElementById('stop-move-btn').onclick = handleStopTurn;
  init();
})();
</script>
</body>
</html>
