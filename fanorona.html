<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona - Lalao</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .flipped { transform: rotate(180deg); }
    .grid-line { stroke: #333; stroke-width: 2; fill: none; }
    
    /* Styles ho an'ny pièce */
    .selected-piece { stroke: #FFF700; stroke-width: 6px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece { stroke: #00FF00; stroke-width: 5px; paint-order: stroke; cursor: pointer; }
    .blocked-piece { stroke: none; } 

    .capture-target { stroke: darkorange; stroke-width: 5px; cursor: pointer; pointer-events: all !important; stroke-dasharray: 5; animation: dash 1s linear infinite; }
    
    @keyframes dash { to { stroke-dashoffset: 10; } }
    .spot { cursor: pointer; pointer-events: all; }
    .guide-dot { fill: #FFF700; opacity: 0.9; pointer-events: none; }

    #players-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 800px;
      margin-bottom: 20px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      color: white;
      font-size: 1em;
      font-weight: 700;
    }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); }
    .dot-maintso { background: #22c55e; }
    .dot-mena { background: #ef4444; }

    #stop-move-btn {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #ef4444;
      color: white;
      border: 4px solid white;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      opacity: 0.3;
      transition: 0.3s;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #stop-move-btn.active { opacity: 1; transform: scale(1.1); pointer-events: all; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

    #game-board { width: 95vw; max-width: 800px; max-height: 70vh; display: block; }
  </style>
</head>
<body>

  <div id="players-bar" style="display:none;"></div>

  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>
    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200 M0 0 L200 200 M100 0 L0 100 M100 0 L300 200 M200 0 L0 200 M200 0 L400 200 M300 0 L100 200 M300 0 L400 100 M400 0 L200 200 M0 100 L100 200 M400 100 L300 200"/>
    <g id="spots-group"></g>
    <g id="guides-group"></g>
    <g id="pieces-group"></g>
  </svg>

  <button id="stop-move-btn">OK</button>

  <script>
(function() {
  const GAME_API_URL = '/api/game';
  const SESSION_API_URL = '/api/session';
  const POLL_INTERVAL = 2000;

  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('gameId');
  const myColor = params.get('color');

  const rows = ['A','B','C','D','E'];
  const cols = ['1','2','3','4','5','6','7','8','9'];

  const allowedMoves = {
    'A1':['A2','B1','B2'],'A2':['A1','A3','B2'],'A3':['A2','A4','B2','B3','B4'],'A4':['A3','A5','B4'],'A5':['A4','A6','B4','B5','B6'],'A6':['A5','A7','B6'],'A7':['A6','A8','B6','B7','B8'],'A8':['A7','A9','B8'],'A9':['A8','B8','B9'],
    'B1':['A1','B2','C1'],'B2':['A1','A2','A3','B1','B3','C1','C2','C3'],'B3':['A3','B2','B4','C3'],'B4':['A3','A4','A5','B3','B5','C3','C4','C5'],'B5':['A5','B4','B6','C5'],'B6':['A5','A6','A7','B5','B7','C5','C6','C7'],'B7':['A7','B6','B8','C7'],'B8':['A7','A8','A9','B7','B9','C7','C8','C9'],'B9':['A9','B8','C9'],
    'C1':['B1','B2','C2','D1','D2'],'C2':['B2','C1','C3','D2'],'C3':['B2','B3','B4','C2','C4','D2','D3','D4'],'C4':['B4','C3','C5','D4'],'C5':['B4','B5','B6','C4','C6','D4','D5','D6'],'C6':['B6','C5','C7','D6'],'C7':['B6','B7','B8','C6','C8','D6','D7','D8'],'C8':['B8','C7','C9','D8'],'C9':['B8','B9','C8','D8','D9'],
    'D1':['C1','D2','E1'],'D2':['C1','C2','C3','D1','D3','E1','E2','E3'],'D3':['C3','D2','D4','E3'],'D4':['C3','C4','C5','D3','D5','E3','E4','E5'],'D5':['C5','D4','D6','E5'],'D6':['C5','C6','C7','D5','D7','E5','E6','E7'],'D7':['C7','D6','D8','E7'],'D8':['C7','C8','C9','D7','D9','E7','E8','E9'],'D9':['C9','D8','E9'],
    'E1':['D1','D2','E2'],'E2':['D2','E1','E3'],'E3':['D2','D3','D4','E2','E4'],'E4':['D4','E3','E5'],'E5':['D4','D5','D6','E4','E6'],'E6':['D6','E5','E7'],'E7':['D6','D7','D8','E6','E8'],'E8':['D8','E7','E9'],'E9':['D8','D9','E8']
  };

  let currentGame = null;
  let selectedSpot = null;
  let myUid = null;
  let isActionPending = false;

  async function callApi(url, action, payload) {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...payload })
      });
      return await res.json();
    } catch (e) { return { success: false }; }
  }

  function getCaptures(pieces, from, to, color) {
    const enemy = color === 'mena' ? 'maintso' : 'mena';
    const r1 = rows.indexOf(from[0]), c1 = cols.indexOf(from[1]);
    const r2 = rows.indexOf(to[0]), c2 = cols.indexOf(to[1]);
    const dr = r2 - r1, dc = c2 - c1;
    const scan = (sr, sc, dR, dC) => {
      let captured = [], r = sr + dR, c = sc + dC;
      while (r>=0 && r<5 && c>=0 && c<9 && pieces[rows[r]+cols[c]] === enemy) {
        captured.push(rows[r]+cols[c]); r += dR; c += dC;
      }
      return captured;
    };
    return { approach: scan(r2, c2, dr, dc), withdrawal: scan(r1, c1, -dr, -dc) };
  }

  function hasGlobalCapture(pieces, color) {
    for (let s in pieces) {
      if (pieces[s] === color) {
        for (let t of (allowedMoves[s] || [])) {
          if (!pieces[t]) {
            const c = getCaptures(pieces, s, t, color);
            if (c.approach.length > 0 || c.withdrawal.length > 0) return true;
          }
        }
      }
    }
    return false;
  }

  function canPieceMove(spot, pieces, color, globalCapture) {
    return (allowedMoves[spot] || []).some(t => {
      if (pieces[t]) return false;
      const c = getCaptures(pieces, spot, t, color);
      return globalCapture ? (c.approach.length > 0 || c.withdrawal.length > 0) : true;
    });
  }

  function updateUI() {
    if (!currentGame) return;
    const stopBtn = document.getElementById('stop-move-btn');
    const isMyTurn = currentGame.turn === myColor;

    if (isMyTurn) {
      if (currentGame.movingPiece) {
        selectedSpot = currentGame.movingPiece;
        stopBtn.classList.add('active');
      } else {
        stopBtn.classList.remove('active');
      }
    } else {
      selectedSpot = null;
      stopBtn.classList.remove('active');
    }

    renderPieces();
    renderGuides();
    renderPlayersBar();
  }

  function renderPieces() {
    const grp = document.getElementById('pieces-group');
    grp.innerHTML = '';
    const pieces = currentGame.pieces || {};
    const globalCap = hasGlobalCapture(pieces, myColor);
    const isMyTurn = currentGame.turn === myColor;

    for (let spot in pieces) {
      const r = rows.indexOf(spot[0]), c = cols.indexOf(spot[1]);
      const color = pieces[spot];
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('transform', `translate(${c * 50}, ${r * 50})`);
      
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('r', 13);
      circle.setAttribute('fill', `url(#${color}-pat)`);
      
      if (isMyTurn && color === myColor) {
        if (selectedSpot === spot) {
          circle.classList.add('selected-piece');
        } else if (!currentGame.movingPiece && canPieceMove(spot, pieces, myColor, globalCap)) {
          circle.classList.add('movable-piece');
          circle.onclick = () => { selectedSpot = spot; updateUI(); };
        } else {
          circle.classList.add('blocked-piece');
        }
      }

      if (currentGame.awaitingCapture && color !== myColor) {
        if ((currentGame.pendingApproach || []).includes(spot) || (currentGame.pendingWithdrawal || []).includes(spot)) {
          circle.classList.add('capture-target');
          circle.onclick = (e) => { e.stopPropagation(); resolveCapture(spot); };
        }
      }

      g.appendChild(circle);
      grp.appendChild(g);
    }
  }

  function renderGuides() {
    const grp = document.getElementById('guides-group');
    grp.innerHTML = '';
    if (!selectedSpot || currentGame.turn !== myColor || currentGame.awaitingCapture) return;

    const pieces = currentGame.pieces || {};
    const globalCap = hasGlobalCapture(pieces, myColor);
    
    (allowedMoves[selectedSpot] || []).forEach(t => {
      if (pieces[t] || (currentGame.visited || []).includes(t)) return;
      const caps = getCaptures(pieces, selectedSpot, t, myColor);
      if (globalCap && !(caps.approach.length > 0 || caps.withdrawal.length > 0)) return;
      
      if (currentGame.movingPiece && currentGame.lastDir) {
        const r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]);
        const r2 = rows.indexOf(t[0]), c2 = cols.indexOf(t[1]);
        if (currentGame.lastDir === `${r2-r1},${c2-c1}`) return;
      }

      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', cols.indexOf(t[1]) * 50);
      dot.setAttribute('cy', rows.indexOf(t[0]) * 50);
      dot.setAttribute('r', 6);
      dot.setAttribute('class', 'guide-dot');
      grp.appendChild(dot);
    });
  }

  function drawSpots() {
    const grp = document.getElementById('spots-group');
    rows.forEach((r, ri) => {
      cols.forEach((c, ci) => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', ci * 50);
        circle.setAttribute('cy', ri * 50);
        circle.setAttribute('r', 20);
        circle.setAttribute('fill', 'transparent');
        circle.setAttribute('class', 'spot');
        circle.onclick = () => handleSpotClick(r + c);
        grp.appendChild(circle);
      });
    });
  }

  async function handleSpotClick(spotID) {
    if (!currentGame || currentGame.turn !== myColor || isActionPending || currentGame.awaitingCapture) return;
    if (selectedSpot && !currentGame.pieces[spotID]) {
      isActionPending = true;
      const res = await callApi(GAME_API_URL, 'make-move', { uid: myUid, gameId, origin: selectedSpot, target: spotID });
      if (res.success) {
        currentGame = res.game;
        if (!currentGame.movingPiece) selectedSpot = null;
      }
      isActionPending = false;
      updateUI();
    }
  }

  async function resolveCapture(capturedSpot) {
    if (isActionPending) return;
    isActionPending = true;
    const res = await callApi(GAME_API_URL, 'resolve-capture', { uid: myUid, gameId, capturedSpot });
    if (res.success) currentGame = res.game;
    isActionPending = false;
    updateUI();
  }

  async function handleStopTurn() {
    if (isActionPending || !currentGame.movingPiece) return;
    isActionPending = true;
    const res = await callApi(GAME_API_URL, 'stop-turn', { uid: myUid, gameId });
    if (res.success) {
      currentGame = res.game;
      selectedSpot = null;
    }
    isActionPending = false;
    updateUI();
  }

  function renderPlayersBar() {
    const bar = document.getElementById('players-bar');
    const oppColor = myColor === 'maintso' ? 'mena' : 'maintso';
    bar.innerHTML = `
      <div class="player-info"><div class="player-dot dot-${oppColor}"></div><span>Adversaire</span></div>
      <div class="player-info"><span>Ianao</span><div class="player-dot dot-${myColor}"></div></div>
    `;
    bar.style.display = 'flex';
  }

  async function init() {
    const stored = localStorage.getItem('user');
    if (!stored) return;
    myUid = JSON.parse(stored).uid;
    
    const data = await callApi(SESSION_API_URL, 'get-fanorona-game', { uid: myUid, gameId });
    if (data.success) {
      currentGame = data;
      document.getElementById('game-board').classList.toggle('flipped', myColor === 'mena');
      drawSpots();
      updateUI();
      document.getElementById('game-board').style.display = 'block';
      setInterval(async () => {
        if (isActionPending) return;
        const sync = await callApi(GAME_API_URL, 'get-game', { uid: myUid, gameId });
        if (sync.success) { currentGame = sync.game; updateUI(); }
      }, POLL_INTERVAL);
    }
  }

  document.getElementById('stop-move-btn').onclick = handleStopTurn;
  init();
})();
  </script>
</body>
</html>
