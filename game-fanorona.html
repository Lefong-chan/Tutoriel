<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fanorona</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --cyan: #00e5ff;
      --glass: rgba(0,0,0,0.30);
      --glass-border: rgba(255,255,255,0.13);
      --r: 13px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

    body {
      font-family:'Rajdhani',sans-serif;
      background: linear-gradient(135deg,#6e8efb 0%,#a777e3 100%);
      overflow:hidden;
      height:100dvh; width:100vw;
    }

    /* ═══════════════════════════════════════
       PORTRAIT  —  3 rows: top | board | bottom
    ═══════════════════════════════════════ */
    #port {
      display:flex; flex-direction:column;
      height:100dvh; width:100vw;
      padding:10px 10px 8px;
      gap:7px;
    }

    #port-top {
      display:flex; align-items:center; justify-content:space-between;
      gap:7px; flex-shrink:0; width:100%;
    }

    #port-board {
      flex:1 1 0; min-height:0;
      display:flex; align-items:center; justify-content:center;
    }

    #game-board {
      background-image:url('img/table-game.jpg');
      background-size:cover;
      border-radius:18px;
      display:block; touch-action:none;
      width:100%; max-width:100%; max-height:100%;
      aspect-ratio:440/240;
    }

    #port-bot {
      display:flex; align-items:center; justify-content:center;
      gap:7px; flex-shrink:0; flex-wrap:nowrap; width:100%;
    }

    /* ═══════════════════════════════════════
       LANDSCAPE  —  left | board | right
    ═══════════════════════════════════════ */
    #land {
      display:none;
      height:100dvh; width:100vw;
      align-items:center; justify-content:center;
      padding:8px 10px; gap:10px;
    }
    #land-left, #land-right {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:9px; flex-shrink:0;
      width:clamp(86px,10vw,126px); height:100%;
    }
    #game-board-ls {
      background-image:url('img/table-game.jpg');
      background-size:cover;
      border-radius:18px;
      display:block; touch-action:none;
      height:calc(100dvh - 16px);
      aspect-ratio:440/240;
      max-width:100%; flex-shrink:0;
    }

    /* ═══════════════════════════════════════
       ORIENTATION SWITCH
    ═══════════════════════════════════════ */
    @media (orientation:portrait)  { #port{display:flex;} #land{display:none!important;} }
    @media (orientation:landscape) { #port{display:none!important;} #land{display:flex;} }

    /* ═══════════════════════════════════════
       COMPONENTS
    ═══════════════════════════════════════ */

    /* Glass widget */
    .hud {
      display:flex; align-items:center; justify-content:center; gap:6px;
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:var(--r); padding:6px 11px; color:#fff;
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      font-family:'Rajdhani',sans-serif; font-weight:600; flex-shrink:0;
    }
    .hud.col { flex-direction:column; gap:7px; width:100%; padding:9px 8px; }

    /* Player card */
    .pcrd {
      display:flex; align-items:center; gap:7px;
      padding:7px 12px;
      background:var(--glass); border:1px solid var(--glass-border);
      border-radius:var(--r); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      color:#fff; min-width:0; flex-shrink:0;
    }
    .pcrd.col { flex-direction:column; gap:4px; text-align:center; width:100%; padding:9px 6px; }
    .pdot {
      width:13px; height:13px; border-radius:50%; flex-shrink:0;
      border:2px solid rgba(255,255,255,0.4); transition:box-shadow .3s;
    }
    .dot-m { background:#22c55e; }
    .dot-r { background:#ef4444; }
    .pdot.on { box-shadow:0 0 0 3px #fff, 0 0 10px 3px rgba(255,255,255,.6); }
    .pname {
      font-size:.87em; letter-spacing:.04em; font-weight:600;
      max-width:84px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* Timer */
    .tblk { display:flex; flex-direction:column; align-items:center; line-height:1; gap:1px; }
    .tlbl { font-size:.58em; opacity:.48; letter-spacing:.1em; text-transform:uppercase; }
    .tval { font-family:'Orbitron',sans-serif; font-size:.98em; font-weight:700; letter-spacing:.04em; }
    .tsep { font-family:'Orbitron',sans-serif; font-size:.95em; opacity:.28; align-self:center; }

    /* Ping */
    .pbars { display:flex; align-items:flex-end; gap:2px; height:13px; }
    .pbar  { width:3px; border-radius:2px; background:rgba(255,255,255,.18); transition:background .4s; }
    .pbar:nth-child(1){height:4px;} .pbar:nth-child(2){height:7px;}
    .pbar:nth-child(3){height:10px;} .pbar:nth-child(4){height:13px;}
    .pbar.on { background:var(--cyan); }
    .pval { font-family:'Orbitron',sans-serif; font-size:.6em; color:var(--cyan); opacity:.7; white-space:nowrap; }

    /* Infinity */
    .isym { font-family:'Orbitron',sans-serif; font-size:1.25em; opacity:.8; }

    /* Action buttons */
    .abtn {
      display:flex; align-items:center; justify-content:center;
      width:42px; height:42px; border-radius:12px;
      background:var(--glass); border:1px solid var(--glass-border);
      color:rgba(255,255,255,.68); font-size:1em; cursor:pointer;
      transition:background .2s,color .2s,border-color .2s;
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); flex-shrink:0;
    }
    .abtn:hover,.abtn:active { background:rgba(124,77,255,.28); border-color:rgba(124,77,255,.5); color:#fff; }
    .dbtn {
      font-family:'Rajdhani',sans-serif; font-size:.65em; font-weight:700;
      letter-spacing:.09em; text-transform:uppercase;
      width:auto; padding:0 9px; min-width:52px; height:42px;
    }
    .abtn.wide { width:100%; border-radius:11px; }
    .dbtn.wide { width:100%; height:38px; }

    /* SVG pieces */
    .flipped { transform:rotate(180deg); }
    .piece-group { transition:transform .22s ease-in-out; }
    .piece-group.no-transition { transition:none; }
    .selected-piece { stroke:#FFF700; stroke-width:5px; paint-order:stroke; filter:drop-shadow(0 0 8px yellow); }
    .movable-piece  { stroke:#ADFF2F; stroke-width:5px; paint-order:stroke; }
    .blocked-piece  { stroke:#FF4500; stroke-width:5px; paint-order:stroke; }
    .capture-target { stroke:darkorange; stroke-width:5px; cursor:pointer; pointer-events:all!important; stroke-dasharray:5; animation:dash 1s linear infinite; }
    @keyframes dash { to{stroke-dashoffset:10;} }
    .spot { cursor:pointer; pointer-events:all; }
    .lock-board .spot { pointer-events:none!important; }
    .cross-line { stroke:white; stroke-width:2; stroke-linecap:round; pointer-events:none; }
    .guide-dot  { fill:#FFF700; opacity:.8; pointer-events:none; }
    .grid-line  { stroke:#333; stroke-width:2; }

    /* Loading */
    #loading-overlay {
      position:fixed; inset:0;
      background:rgba(0,100,200,.45); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);
      display:flex; justify-content:center; align-items:center;
      z-index:200; color:white; flex-direction:column; gap:16px;
    }
    #loading-overlay.hidden { display:none; }
    .spinner { width:32px; height:32px; border:4px solid rgba(255,255,255,.25); border-top-color:white; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }
    #error-msg { display:none; position:fixed; bottom:56px; left:0; right:0; color:#fef08a; font-size:1em; text-align:center; z-index:300; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="text-align:center;line-height:1.6;">
    <div style="font-size:1.05em;font-weight:800;letter-spacing:.03em;">Waiting for opponent</div>
    <div style="font-size:.82em;opacity:.7;font-weight:400;margin-top:3px;">Miandry ny adversaire…</div>
  </div>
</div>

<!-- ════════════ PORTRAIT ════════════ -->
<div id="port">

  <!-- TOP ROW -->
  <div id="port-top">

    <!-- Opponent (left) -->
    <div class="pcrd" id="p-opp-card">
      <div class="pdot" id="p-opp-dot" style="background:rgba(255,255,255,.18);"></div>
      <span class="pname" id="p-opp-name" style="opacity:.4;">---</span>
    </div>

    <!-- Center HUDs -->
    <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:center;min-width:0;">
      <!-- Timer -->
      <div class="hud" style="gap:9px;padding:5px 10px;">
        <div class="tblk"><span class="tlbl">OPP</span><span class="tval">∞</span></div>
        <span class="tsep">|</span>
        <div class="tblk"><span class="tlbl">YOU</span><span class="tval">∞</span></div>
      </div>
      <!-- Ping -->
      <div class="hud" style="padding:5px 9px;gap:5px;">
        <div class="pbars" id="p-ping-bars">
          <div class="pbar on"></div><div class="pbar on"></div>
          <div class="pbar on"></div><div class="pbar"></div>
        </div>
        <span class="pval" id="p-ping-val">—</span>
      </div>
    </div>

    <!-- Me (right) -->
    <div class="pcrd" id="p-my-card" style="flex-direction:row-reverse;">
      <div class="pdot" id="p-my-dot" style="background:rgba(255,255,255,.18);"></div>
      <span class="pname" id="p-my-name" style="opacity:.4;text-align:right;">---</span>
    </div>

  </div><!-- /#port-top -->

  <!-- BOARD -->
  <div id="port-board">
    <svg id="game-board" viewBox="-20 -20 440 240">
      <defs>
        <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
        </pattern>
        <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
        </pattern>
      </defs>
      <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
        M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
        M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
        M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
        M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
        M300 0 L400 100 M400 0 L200 200
        M0 100 L100 200 M400 100 L300 200"/>
      <g id="guides-group"></g>
      <g id="pieces-group"></g>
      <g id="spots-group"></g>
    </svg>
  </div>

  <!-- BOTTOM ROW -->
  <div id="port-bot">

    <!-- OK -->
    <button class="abtn dbtn" id="stop-move-btn">OK</button>
    <!-- Message -->
    <button class="abtn"><i class="fas fa-comment-dots"></i></button>
    <!-- Settings -->
    <button class="abtn"><i class="fas fa-sliders-h"></i></button>
    <!-- Demande -->
    <button class="abtn dbtn">DEMANDE</button>
  </div>

</div>


<!-- ════════════ LANDSCAPE ════════════ -->
<div id="land">

  <!-- LEFT -->
  <div id="land-left">
    <div class="pcrd col" id="l-opp-card">
      <div class="pdot" id="l-opp-dot" style="background:rgba(255,255,255,.18);"></div>
      <span class="pname" id="l-opp-name" style="opacity:.4;">---</span>
    </div>
    <div class="hud col">
      <div class="tblk"><span class="tlbl">OPP</span><span class="tval">∞</span></div>
    </div>
    
    <button class="abtn dbtn wide">DEMANDE</button>
    <button class="abtn wide"><i class="fas fa-comment-dots"></i></button>
  </div>

  <!-- BOARD LS -->
  <div style="display:flex;align-items:center;justify-content:center;flex-shrink:0;height:100%;">
    <svg id="game-board-ls" viewBox="-20 -20 440 240">
      <defs>
        <pattern id="mena-pat-ls" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
        </pattern>
        <pattern id="maintso-pat-ls" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
        </pattern>
      </defs>
      <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
        M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
        M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
        M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
        M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
        M300 0 L400 100 M400 0 L200 200
        M0 100 L100 200 M400 100 L300 200"/>
      <g id="guides-group-ls"></g>
      <g id="pieces-group-ls"></g>
      <g id="spots-group-ls"></g>
    </svg>
  </div>

  <!-- RIGHT -->
  <div id="land-right">
    <div class="pcrd col" id="l-my-card">
      <div class="pdot" id="l-my-dot" style="background:rgba(255,255,255,.18);"></div>
      <span class="pname" id="l-my-name" style="opacity:.4;">---</span>
    </div>
    <div class="hud col">
      <div class="tblk"><span class="tlbl">YOU</span><span class="tval">∞</span></div>
    </div>
    <button class="abtn dbtn wide" id="stop-move-btn">OK</button>

    <button class="abtn wide"><i class="fas fa-sliders-h"></i></button>
  </div>

</div><!-- /#land -->

<div id="error-msg"></div>

  <script>
  (function () {

    //  SECTION 1 — Config & helpers
    var SESSION_API_URL = '/api/session';
    var GAME_API_URL    = '/api/game-fanorona';
    var POLL_INTERVAL   = 1500;
    var RECONCILE_DELAY = 5000;

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('loading-overlay').classList.add('hidden');
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var gameOverTriggered = false;
    function disableBoardCompletely() {
      var board = document.getElementById('game-board');
      if (board) board.classList.add('lock-board');
      var stopBtn = document.getElementById('stop-move-btn');
      if (stopBtn) { stopBtn.classList.remove('active'); stopBtn.style.pointerEvents = 'none'; }
      document.getElementById('guides-group').innerHTML = '';
      document.querySelectorAll('.selected-piece,.movable-piece,.blocked-piece,.capture-target').forEach(function(el) {
        el.removeAttribute('class');
      });
      document.querySelectorAll('.cross-line').forEach(function(el) { el.remove(); });
    }

    function showGameOverAlert(winnerColor, delayMs) {
      if (gameOverTriggered) return;
      gameOverTriggered = true;

      disableBoardCompletely();

      var delay = (typeof delayMs === 'number') ? delayMs : 2000;

      setTimeout(function() {
        var overlay = document.createElement('div');
        overlay.style.cssText = [
          'position:fixed','inset:0','background:rgba(0,0,0,0.7)',
          'display:flex','justify-content:center','align-items:center',
          'z-index:9999','flex-direction:column','gap:0'
        ].join(';');

        var box = document.createElement('div');
        box.style.cssText = [
          'background:#1a3a5c','border-radius:18px','padding:36px 40px',
          'text-align:center','color:white','font-family:sans-serif',
          'box-shadow:0 8px 40px rgba(0,0,0,0.6)','max-width:320px','width:88vw'
        ].join(';');

        var iWon  = (winnerColor === myColor);
        var myMsg = iWon ? '&#127942; You win!' : '&#128532; You lose!';

        var title = document.createElement('div');
        title.style.cssText = 'font-size:1.6em;font-weight:800;margin-bottom:28px;';
        title.textContent = myMsg;

        var btn = document.createElement('button');
        btn.textContent = 'OK';
        btn.style.cssText = [
          'background:#0092FF','color:white','border:none',
          'border-radius:10px','padding:12px 48px',
          'font-size:1.1em','font-weight:700','cursor:pointer',
          'box-shadow:0 2px 10px rgba(0,146,255,0.4)'
        ].join(';');
        btn.onclick = function() {
          window.location.href = 'dashboard.html';
        };

        box.appendChild(title);
        box.appendChild(btn);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
      }, delay);
    }

    async function callApi(url, action, payload) {
      var r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action }, payload))
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'API error');
      return d;
    }

    //  SECTION 2 — Constantes du jeu
    var rows = ['A','B','C','D','E'];
    var cols = ['1','2','3','4','5','6','7','8','9'];

    var allowedMoves = {
      'A1':['A2','B1','B2'],'A2':['A1','A3','B2'],'A3':['A2','A4','B2','B3','B4'],
      'A4':['A3','A5','B4'],'A5':['A4','A6','B4','B5','B6'],'A6':['A5','A7','B6'],
      'A7':['A6','A8','B6','B7','B8'],'A8':['A7','A9','B8'],'A9':['A8','B8','B9'],
      'B1':['A1','B2','C1'],'B2':['A1','A2','A3','B1','B3','C1','C2','C3'],'B3':['A3','B2','B4','C3'],
      'B4':['A3','A4','A5','B3','B5','C3','C4','C5'],'B5':['A5','B4','B6','C5'],
      'B6':['A5','A6','A7','B5','B7','C5','C6','C7'],
      'B7':['A7','B6','B8','C7'],'B8':['A7','A8','A9','B7','B9','C7','C8','C9'],'B9':['A9','B8','C9'],
      'C1':['B1','B2','C2','D1','D2'],'C2':['B2','C1','C3','D2'],
      'C3':['B2','B3','B4','C2','C4','D2','D3','D4'],
      'C4':['B4','C3','C5','D4'],'C5':['B4','B5','B6','C4','C6','D4','D5','D6'],
      'C6':['B6','C5','C7','D6'],
      'C7':['B6','B7','B8','C6','C8','D6','D7','D8'],'C8':['B8','C7','C9','D8'],
      'C9':['B8','B9','C8','D8','D9'],
      'D1':['C1','D2','E1'],'D2':['C1','C2','C3','D1','D3','E1','E2','E3'],'D3':['C3','D2','D4','E3'],
      'D4':['C3','C4','C5','D3','D5','E3','E4','E5'],'D5':['C5','D4','D6','E5'],
      'D6':['C5','C6','C7','D5','D7','E5','E6','E7'],
      'D7':['C7','D6','D8','E7'],'D8':['C7','C8','C9','D7','D9','E7','E8','E9'],'D9':['C9','D8','E9'],
      'E1':['D1','D2','E2'],'E2':['D2','E1','E3'],'E3':['D2','D3','D4','E2','E4'],
      'E4':['D4','E3','E5'],'E5':['D4','D5','D6','E4','E6'],'E6':['D6','E5','E7'],
      'E7':['D6','D7','D8','E6','E8'],'E8':['D8','E7','E9'],'E9':['D8','D9','E8'],
    };

    //  SECTION 3 — État
    var myColor    = null;
    var myOppColor = null;
    var gameId     = null;
    var myUid      = null;

    var localState = null;

    var selectedSpot    = null;
    var lastBlockedSpot = null;
    var canChangePiece  = true;
    var pendingCaptures = { approach: [], withdrawal: [], moveData: null };

    var piecesOnBoard = {};

    var moveQueue       = [];
    var movingInProgress = false;

    var lastSeenHistKey   = null;

    var reconcileTimer = null;

    var myDotEl  = null;
    var oppDotEl = null;

    //  SECTION 4 — Init

    var params   = new URLSearchParams(window.location.search);
    var gameId_p = params.get('gameId');
    var color_p  = params.get('color');
    var inviteId = params.get('inviteId');
    var gameSource = params.get('source') || 'fanorona';

    async function init() {
      if (!gameId_p || !color_p || !inviteId) { showError('Diso ny fampidirana.'); return; }
      if (color_p !== 'maintso' && color_p !== 'mena') { showError('Diso ny color.'); return; }

      var stored = localStorage.getItem('user');
      if (!stored) { window.location.href = 'login&register.html'; return; }
      var localUser = null;
      try { localUser = JSON.parse(stored); } catch(e) {}
      if (!localUser || !localUser.uid) { window.location.href = 'login&register.html'; return; }

      try {
        var data = await callApi(SESSION_API_URL, 'get-fanorona-game', { uid: localUser.uid, gameId: gameId_p });
        if (!data.success) { showError('Tsy hita ny lalao.'); return; }

        myUid      = localUser.uid;
        gameId     = gameId_p;
        myColor    = color_p;
        myOppColor = color_p === 'maintso' ? 'mena' : 'maintso';

        renderPlayersBar(myColor, localUser.username || localUser.uid, data.opponentUsername || '???');

        if (myColor === 'mena') document.getElementById('game-board').classList.add('flipped');

        drawBoardSpots();

        document.getElementById('stop-move-btn').onclick = function() { handleStopBtn(); };

        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (d.success) {
          localState = copyState(d.game);
          // Masomboly ny mpilalao roa vao esorina ny loading-overlay
          if (data.opponentUsername && data.opponentUsername !== '???') {
            document.getElementById('loading-overlay').classList.add('hidden');
          }
          applyLocalState();
        }

        setInterval(pollAdversaire, POLL_INTERVAL);
        setInterval(checkBothPlayersReady, 2000);

      } catch(err) { showError('Nisy olana: ' + err.message); }
    }

    //  SECTION 5 — Players bar

    function renderPlayersBar(myCol, myUsername, oppUsername) {
      var bar = document.getElementById('players-bar');
      var myDotClass  = myCol === 'maintso' ? 'dot-maintso' : 'dot-mena';
      var oppDotClass = myCol === 'maintso' ? 'dot-mena'    : 'dot-maintso';
      bar.innerHTML =
        // Adversaire (gauche)
        '<div class="player-info">' +
          '<div class="player-dot ' + oppDotClass + '" id="opp-dot"></div>' +
          '<span class="player-name">' + escapeHtml(oppUsername) + '</span>' +
        '</div>' +
        // Moi (droite)
        '<div class="player-info">' +
          '<span class="player-name">' + escapeHtml(myUsername) + '</span>' +
          '<div class="player-dot ' + myDotClass + '" id="my-dot"></div>' +
        '</div>';
      myDotEl  = document.getElementById('my-dot');
      oppDotEl = document.getElementById('opp-dot');
    }

    function updateTurnIndicator(turn) {
      if (!myDotEl || !oppDotEl) return;
      if (turn === myColor) {
        myDotEl.classList.add('active-turn');   oppDotEl.classList.remove('active-turn');
      } else {
        oppDotEl.classList.add('active-turn');  myDotEl.classList.remove('active-turn');
      }
    }

    //  SECTION 6 — Polling adversaire UNIQUEMENT
    async function pollAdversaire() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;
        var serverTurn = d.game.turn;

        if (movingInProgress) return;

        if (serverTurn !== myColor) {
          if (localState) {
            localState.pieces = Object.assign({}, d.game.pieces);
            localState.turn   = d.game.turn;
            renderPieces(localState.pieces, localState);
          }
          return;
        }

        if (selectedSpot || (localState && localState.movingPiece)) return;

        var histColor = d.game.lastTurnColor || '';
        var history   = Array.isArray(d.game.lastTurnHistory) ? d.game.lastTurnHistory : [];
        var histKey   = histColor + '|' + history.length + '|' +
                        (history.length > 0 ? history[history.length - 1].target : '');

        if (histColor === myOppColor && history.length > 0 && histKey !== lastSeenHistKey) {
          lastSeenHistKey = histKey;
        }

        var serverPiecesStr = JSON.stringify(d.game.pieces);
        var localPiecesStr  = localState ? JSON.stringify(localState.pieces) : '';
        if (serverPiecesStr === localPiecesStr && localState && localState.turn === myColor) return;

        localState      = copyState(d.game);
        canChangePiece  = true;
        selectedSpot    = null;
        lastBlockedSpot = null;
        pendingCaptures = { approach: [], withdrawal: [], moveData: null };
        document.getElementById('guides-group').innerHTML = '';
        document.getElementById('stop-move-btn').classList.remove('active');
        applyLocalState();

        var myPieceCountPoll  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
        var oppPieceCountPoll = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
        if (myPieceCountPoll === 0) {
          showGameOverAlert(myOppColor, 2000);
        } else if (oppPieceCountPoll === 0) {
          showGameOverAlert(myColor, 2000);
        }

      } catch(e) { console.warn('poll error', e); }
    }

    function copyState(game) {
      return {
        pieces:      Object.assign({}, game.pieces),
        turn:        game.turn,
        movingPiece: game.movingPiece || '',
        visited:     (game.visited || []).slice(),
        lastDir:     game.lastDir || '',
      };
    }

    function applyLocalState() {
      updateTurnIndicator(localState.turn);
      var stopBtn = document.getElementById('stop-move-btn');
      if (localState.turn === myColor && localState.movingPiece) {
        stopBtn.classList.add('active');
      } else if (!movingInProgress) {
        stopBtn.classList.remove('active');
      }
      renderPieces(localState.pieces, localState);
      if (selectedSpot && localState.turn === myColor) {
        renderGuides(selectedSpot, localState);
      }
    }

    //  SECTION 7 — Spots cliquables
    function drawBoardSpots() {
      var spotsGrp = document.getElementById('spots-group');
      spotsGrp.innerHTML = '';
      rows.forEach(function(r, ri) {
        cols.forEach(function(c, ci) {
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', ci * 50);
          circle.setAttribute('cy', ri * 50);
          circle.setAttribute('r', 18);
          circle.setAttribute('fill', 'transparent');
          circle.setAttribute('class', 'spot');
          (function(spotID) { circle.onclick = function(e) { e.stopPropagation(); handleSpotClick(spotID); }; })(r + c);
          spotsGrp.appendChild(circle);
        });
      });
    }

    function handleSpotClick(spotID) {
      if (!localState || localState.turn !== myColor) return;
      if (pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0) return;

      var pieces = localState.pieces;

      if (canChangePiece && pieces[spotID] === myColor) {
        if (canPieceMove(spotID, pieces, myColor, playerHasAnyCapture(pieces, myColor))) {
          selectedSpot    = spotID;
          lastBlockedSpot = null;
        } else {
          selectedSpot    = null;
          lastBlockedSpot = spotID;
        }
        renderGuides(selectedSpot || '', localState);
        renderPieces(pieces, localState);
        return;
      }

      if (!selectedSpot) return;
      if ((allowedMoves[selectedSpot] || []).indexOf(spotID) === -1) return;
      if (pieces[spotID]) return;
      if (localState.visited && localState.visited.indexOf(spotID) !== -1) return;

      var caps = getCaptures(pieces, selectedSpot, spotID, myColor);
      var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
      if (playerHasAnyCapture(pieces, myColor) && !isCaptureMove) return;

      var r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]);
      var r2 = rows.indexOf(spotID[0]),       c2 = cols.indexOf(spotID[1]);
      var dir = (r2-r1) + ',' + (c2-c1);
      if (!canChangePiece && localState.lastDir === dir) return;

      var origin     = selectedSpot;
      var newPieces  = Object.assign({}, pieces);
      delete newPieces[origin];
      newPieces[spotID] = myColor;
      var newVisited = (localState.visited || []).concat([origin]);

      if (isCaptureMove && caps.approach.length > 0 && caps.withdrawal.length > 0) {
        pendingCaptures = {
          approach:   caps.approach,
          withdrawal: caps.withdrawal,
          moveData:   { origin: origin, target: spotID, dir: dir }
        };
        localState.pieces  = newPieces;
        localState.visited = newVisited;
        selectedSpot = spotID;
        renderPieces(newPieces, localState);
        // Guides vides pendant le choix
        document.getElementById('guides-group').innerHTML = '';
        return;
      }

      var capturedSpots = isCaptureMove ? caps.approach.concat(caps.withdrawal) : [];
      doMove(origin, spotID, capturedSpots, dir, newVisited, newPieces, isCaptureMove);
    }

    function confirmCapture(type) {
      var md = pendingCaptures.moveData;
      var capturedSpots = type === 'approach' ? pendingCaptures.approach : pendingCaptures.withdrawal;
      pendingCaptures = { approach: [], withdrawal: [], moveData: null };
      var newPieces  = Object.assign({}, localState.pieces);
      var newVisited = (localState.visited || []).slice();
      doMove(md.origin, md.target, capturedSpots, md.dir, newVisited, newPieces, true);
    }

    function doMove(origin, target, capturedSpots, dir, newVisited, newPieces, wasCapture) {
      capturedSpots.forEach(function(s) { delete newPieces[s]; });

      var canContinue = wasCapture && checkAvailableCaptures(newPieces, target, newVisited, dir, myColor);

      movingInProgress = true;
      localState.pieces = newPieces;

      if (canContinue) {
        localState.movingPiece = target;
        localState.visited     = newVisited;
        localState.lastDir     = dir;
        selectedSpot   = target;
        canChangePiece = false;
        document.getElementById('stop-move-btn').classList.add('active');
      } else {
        localState.turn        = myOppColor;
        localState.movingPiece = '';
        localState.visited     = [];
        localState.lastDir     = '';
        selectedSpot    = null;
        lastBlockedSpot = null;
        canChangePiece  = true;
        document.getElementById('stop-move-btn').classList.remove('active');
      }

      if (canContinue && selectedSpot) {
        renderGuides(selectedSpot, localState);
      } else {
        document.getElementById('guides-group').innerHTML = '';
      }

      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);

      sendMoveToBackend(origin, target, capturedSpots, dir);

      if (!canContinue) {
        scheduleReconcile();
      }

      if (!canContinue) {
        var myPieceCount  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
        var oppPieceCount = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
        if (oppPieceCount === 0) {
          showGameOverAlert(myColor, 2000);
        } else if (myPieceCount === 0) {
          showGameOverAlert(myOppColor, 2000);
        }
      }
    }

    function handleStopBtn() {
      if (!localState || localState.turn !== myColor || !localState.movingPiece) return;
      var piecesSnapshot = Object.assign({}, localState.pieces);

      movingInProgress = true;
      localState.turn        = myOppColor;
      localState.movingPiece = '';
      localState.visited     = [];
      localState.lastDir     = '';
      selectedSpot    = null;
      lastBlockedSpot = null;
      canChangePiece  = true;
      document.getElementById('stop-move-btn').classList.remove('active');
      document.getElementById('guides-group').innerHTML = '';
      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);

      callApi(GAME_API_URL, 'stop-move', { uid: myUid, gameId: gameId, pieces: piecesSnapshot })
        .catch(function(e) { console.warn('stop-move error', e); });

      scheduleReconcile();

      var myPieceCountS  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
      var oppPieceCountS = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
      if (oppPieceCountS === 0) {
        showGameOverAlert(myColor, 2000);
      } else if (myPieceCountS === 0) {
        showGameOverAlert(myOppColor, 2000);
      }
    }

    //  Envoi backend & réconciliation
    function sendMoveToBackend(origin, target, capturedSpots, dir) {
      callApi(GAME_API_URL, 'make-move', {
        uid: myUid, gameId: gameId,
        origin: origin, target: target,
        capturedSpots: capturedSpots, dir: dir
      }).catch(function(e) {
        console.warn('make-move backend error (non-blocking):', e);
      });
    }

    function scheduleReconcile() {
      if (reconcileTimer) clearTimeout(reconcileTimer);
      reconcileTimer = setTimeout(function() {
        reconcileTimer = null;
        doReconcile();
      }, RECONCILE_DELAY);
    }

    async function doReconcile() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;

        movingInProgress = false;

        var serverTurn = d.game.turn;

        if (serverTurn !== myColor) {
          if (localState.turn !== myColor) return;
          localState = copyState(d.game);
          selectedSpot    = null;
          lastBlockedSpot = null;
          canChangePiece  = true;
          pendingCaptures = { approach: [], withdrawal: [], moveData: null };
          document.getElementById('guides-group').innerHTML = '';
          document.getElementById('stop-move-btn').classList.remove('active');
          applyLocalState();

        } else {
          var serverMoving = d.game.movingPiece || '';
          if (serverMoving) {
            selectedSpot   = localState.movingPiece || serverMoving;
            canChangePiece = false;
            localState.movingPiece = selectedSpot;
            document.getElementById('stop-move-btn').classList.add('active');
          }
          // Rerender avec le state actuel (pas de rollback)
          if (selectedSpot) renderGuides(selectedSpot, localState);
          renderPieces(localState.pieces, localState);
          updateTurnIndicator(localState.turn);
        }
      } catch(e) {
        movingInProgress = false;
        console.warn('reconcile error', e);
      }
    }

    //  SECTION 10
    function renderPieces(pieces, stateData) {
      var grp           = document.getElementById('pieces-group');
      var isMyTurn      = stateData.turn === myColor;
      var globalCapture = playerHasAnyCapture(pieces, myColor);

      var newPiecesOnBoard = {};
      var vanished = Object.keys(piecesOnBoard).filter(function(k) { return !pieces[k]; });
      var appeared = Object.keys(pieces).filter(function(k) { return !piecesOnBoard[k]; });

      vanished.forEach(function(vKey) {
        var color  = piecesOnBoard[vKey].color;
        var target = null;
        for (var i = 0; i < appeared.length; i++) {
          if (pieces[appeared[i]] === color) { target = appeared[i]; break; }
        }
        if (target) {
          newPiecesOnBoard[target] = piecesOnBoard[vKey];
          appeared = appeared.filter(function(a) { return a !== target; });
        } else {
          piecesOnBoard[vKey].el.remove();
        }
      });

      appeared.forEach(function(aKey) {
        var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'piece-group');
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('r', 8);
        g.appendChild(c);
        grp.appendChild(g);
        newPiecesOnBoard[aKey] = { el: g, color: pieces[aKey] };
      });

      Object.keys(pieces).forEach(function(k) {
        if (!newPiecesOnBoard[k]) newPiecesOnBoard[k] = piecesOnBoard[k];
      });
      piecesOnBoard = newPiecesOnBoard;

      var hasPending = pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0;

      Object.keys(pieces).forEach(function(spot) {
        var ri = rows.indexOf(spot[0]), ci = cols.indexOf(spot[1]);
        if (ri < 0 || ci < 0) return;
        var entry = piecesOnBoard[spot];
        if (!entry) return;
        var g = entry.el, circle = g.querySelector('circle');

        var svgX = ci * 50;
        var svgY = ri * 50;
        g.setAttribute('transform', 'translate(' + svgX + ',' + svgY + ')');
        circle.setAttribute('fill', 'url(#' + pieces[spot] + '-pat)');
        circle.removeAttribute('class');
        circle.style.pointerEvents = 'all';
        circle.onclick = (function(s) {
          return function(e) { e.stopPropagation(); handleSpotClick(s); };
        })(spot);

        if (isMyTurn && pieces[spot] === myColor) {
          if (selectedSpot === spot)
            circle.setAttribute('class', 'selected-piece');
          else if (lastBlockedSpot === spot)
            circle.setAttribute('class', 'blocked-piece');
          else if (!stateData.movingPiece && canPieceMove(spot, pieces, myColor, globalCapture))
            circle.setAttribute('class', 'movable-piece');
        }

        var isApp  = pendingCaptures.approach.indexOf(spot)   !== -1;
        var isWith = pendingCaptures.withdrawal.indexOf(spot) !== -1;
        g.querySelectorAll('.cross-line').forEach(function(l) { l.remove(); });

        if (isApp || isWith) {
          circle.classList.add('capture-target');
          circle.style.pointerEvents = 'all';
          var ct = isApp ? 'approach' : 'withdrawal';
          circle.onclick = (function(type) {
            return function(e) { e.stopPropagation(); confirmCapture(type); };
          })(ct);
          g.appendChild(createCross(-5,-5,5,5));
          g.appendChild(createCross(5,-5,-5,5));
        }
      });

      var board = document.getElementById('game-board');
      if (!isMyTurn || hasPending) board.classList.add('lock-board');
      else board.classList.remove('lock-board');
    }

    function createCross(x1,y1,x2,y2) {
      var l = document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('class','cross-line');
      return l;
    }

    //— Guides
    function renderGuides(startSpot, stateData) {
      var grp = document.getElementById('guides-group');
      if (!grp) return;
      grp.innerHTML = '';
      if (!startSpot) return;

      var pieces  = stateData.pieces;
      var visited = stateData.visited  || [];
      var lastDir = stateData.lastDir  || '';
      var globalCapturePossible = playerHasAnyCapture(pieces, myColor);
      var moves = allowedMoves[startSpot] || [];

      moves.forEach(function(target) {
        if (pieces[target] || visited.indexOf(target) !== -1) return;
        var caps = getCaptures(pieces, startSpot, target, myColor);
        var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
        if (globalCapturePossible && !isCaptureMove) return;

        var r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
        var r2 = rows.indexOf(target[0]),    c2 = cols.indexOf(target[1]);
        var dir = (r2-r1) + ',' + (c2-c1);
        if (!canChangePiece && lastDir === dir) return;

        var svgX = c2 * 50;
        var svgY = r2 * 50;

        var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', svgX); dot.setAttribute('cy', svgY);
        dot.setAttribute('r', 6); dot.setAttribute('class', 'guide-dot');
        grp.appendChild(dot);
      });
    }

    //  SECTION 12
    function getCaptures(pieces, s, e, color) {
      var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(e[0]),c2=cols.indexOf(e[1]);
      var enemy=color==='maintso'?'mena':'maintso', dr=r2-r1, dc=c2-c1;
      function scan(row,col,sr,sc) {
        var res=[],cr=row+sr,cc=col+sc;
        while(cr>=0&&cr<5&&cc>=0&&cc<9&&pieces[rows[cr]+cols[cc]]===enemy){res.push(rows[cr]+cols[cc]);cr+=sr;cc+=sc;}
        return res;
      }
      return { approach: scan(r2,c2,dr,dc), withdrawal: scan(r1,c1,-dr,-dc) };
    }

    function playerHasAnyCapture(pieces, color) {
      var sl = Object.keys(pieces);
      for (var i=0;i<sl.length;i++) {
        var s=sl[i]; if(pieces[s]!==color)continue;
        var mv=allowedMoves[s]||[];
        for (var j=0;j<mv.length;j++) {
          var t=mv[j]; if(!pieces[t]){var c=getCaptures(pieces,s,t,color);if(c.approach.length>0||c.withdrawal.length>0)return true;}
        }
      }
      return false;
    }

    function canPieceMove(spot, pieces, color, globalCapture) {
      var mv=allowedMoves[spot]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i]; if(pieces[t])continue;
        var caps=getCaptures(pieces,spot,t,color);
        var isCap=caps.approach.length>0||caps.withdrawal.length>0;
        if(globalCapture?isCap:true)return true;
      }
      return false;
    }

    function checkAvailableCaptures(pieces, s, visited, lastDir, color) {
      var mv=allowedMoves[s]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i];
        if(pieces[t]||(visited&&visited.indexOf(t)!==-1))continue;
        var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(t[0]),c2=cols.indexOf(t[1]);
        var dir=(r2-r1)+','+(c2-c1);
        if(lastDir&&lastDir===dir)continue;
        var caps=getCaptures(pieces,s,t,color);
        if(caps.approach.length>0||caps.withdrawal.length>0)return true;
      }
      return false;
    }

    //  SECTION 11b — Attente des deux joueurs
    var bothPlayersReadyTimer = null;
    function checkBothPlayersReady() {
      if (document.getElementById('loading-overlay').classList.contains('hidden')) return;
      callApi(SESSION_API_URL, 'get-fanorona-game', { uid: myUid, gameId: gameId })
        .then(function(data) {
          if (data.success && data.opponentUsername && data.opponentUsername !== '???') {
            // Mettre à jour le nom de l'adversaire dans la barre
            renderPlayersBar(myColor,
              (JSON.parse(localStorage.getItem('user') || '{}')).username || myUid,
              data.opponentUsername);
            document.getElementById('loading-overlay').classList.add('hidden');
          }
        })
        .catch(function() {});
    }

    init();

  })();
  </script>
