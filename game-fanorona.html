<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f0c040;
      --gold-dim: #b8922a;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.13);
      --shadow-deep: 0 8px 40px rgba(0,0,0,0.55);
      --radius-card: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ─── Ambient background particles ─── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(110,142,251,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(167,119,227,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0,229,255,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ══════════════════════════════════════
       PORTRAIT LAYOUT
    ══════════════════════════════════════ */

    /* ─── Top zone (portrait) ─── */
    #top-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 95vw;
      max-width: 800px;
      z-index: 1;
    }

    /* ─── Player cards (portrait) ─── */
    #players-portrait {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
    }

    .player-card {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 9px 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1em;
      font-weight: 600;
      transition: box-shadow 0.35s, border-color 0.35s;
      position: relative;
      overflow: hidden;
    }
    .player-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .player-card.active-card {
      border-color: rgba(240,192,64,0.6);
      box-shadow: 0 0 18px rgba(240,192,64,0.3), inset 0 0 12px rgba(240,192,64,0.06);
    }
    .player-card.left-card { flex-direction: row; }
    .player-card.right-card { flex-direction: row-reverse; }

    .player-dot {
      width: 16px; height: 16px;
      border-radius: 50%; flex-shrink: 0;
      border: 2.5px solid rgba(255,255,255,0.5);
      transition: box-shadow 0.3s;
      position: relative;
    }
    .dot-maintso { background: radial-gradient(circle at 35% 35%, #4ade80, #16a34a); }
    .dot-mena    { background: radial-gradient(circle at 35% 35%, #f87171, #dc2626); }
    .player-dot.active-turn {
      box-shadow: 0 0 0 3px rgba(240,192,64,0.8), 0 0 14px 4px rgba(240,192,64,0.5);
    }
    .player-name { font-size: 0.95em; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

    /* ─── Timer row (portrait) ─── */
    #timers-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 10px;
    }

    .timer-card {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 6px 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
    }
    .timer-icon {
      font-size: 0.8em;
      opacity: 0.6;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
    }
    .timer-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1em;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .shared-timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .shared-timer-label {
      font-size: 0.6em;
      color: rgba(255,255,255,0.45);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .shared-timer-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1em;
      font-weight: 700;
      color: var(--accent);
    }

    /* ─── Utility row (portrait) — ping, message, params, demande ─── */
    #utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 2px;
    }
    .util-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: white;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1em;
      transition: background 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .util-btn:hover { background: rgba(255,255,255,0.15); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

    .btn-demande {
      flex: 1;
      max-width: 110px;
      width: auto;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82em;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0 10px;
    }

    .ping-display {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0 10px;
      height: 38px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .ping-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: ping-pulse 2s ease-in-out infinite;
    }
    @keyframes ping-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }
    .ping-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65em;
      color: rgba(255,255,255,0.6);
    }

    /* ─── Game board ─── */
    #board-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-board {
      width: 95vw;
      max-width: 800px;
      max-height: 58vh;
      display: block;
      border-radius: 16px;
      overflow: visible;
    }

    .board-bg-image {
      border-radius: 16px;
    }

    .grid-line { stroke: rgba(60,40,10,0.7); stroke-width: 2; }

    /* ─── Bottom zone (portrait) ─── */
    #bottom-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 95vw;
      max-width: 800px;
      z-index: 1;
    }

    /* ─── Stop / OK button ─── */
    #stop-move-btn {
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ff4d6d, #c0002b);
      color: white;
      border: 3px solid rgba(255,255,255,0.7);
      font-size: 1em;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(192,0,43,0.3);
      letter-spacing: 0.05em;
    }
    #stop-move-btn.active {
      opacity: 1;
      transform: scale(1.08);
      box-shadow: 0 0 0 4px rgba(255,77,109,0.35), 0 6px 24px rgba(192,0,43,0.5);
      pointer-events: all;
    }

    /* ─── Piece styles (unchanged) ─── */
    .flipped { transform: rotate(180deg); }
    .piece-group { transition: transform 0.22s ease-in-out; }
    .piece-group.no-transition { transition: none; }
    .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece  { stroke: #ADFF2F; stroke-width: 5px; paint-order: stroke; }
    .blocked-piece  { stroke: #FF4500; stroke-width: 5px; paint-order: stroke; }
    .capture-target {
      stroke: darkorange; stroke-width: 5px; cursor: pointer;
      pointer-events: all !important; stroke-dasharray: 5;
      animation: dash 1s linear infinite;
    }
    @keyframes dash { to { stroke-dashoffset: 10; } }
    .spot { cursor: pointer; pointer-events: all; }
    .lock-board .spot { pointer-events: none !important; }
    .cross-line { stroke: white; stroke-width: 2; stroke-linecap: round; pointer-events: none; }
    .guide-dot  { fill: #FFF700; opacity: 0.8; pointer-events: none; }

    /* ─── Loading ─── */
    #loading-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; color: white; font-size: 1.2em; font-weight: 700;
      flex-direction: column; gap: 16px;
      font-family: 'Rajdhani', sans-serif;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Error ─── */
    #error-msg { display: none; color: #fef08a; font-size: 1em; margin-top: 10px; text-align: center; z-index: 1; }

    /* ════════════════════════════════════
       LANDSCAPE LAYOUT
    ════════════════════════════════════ */
    @media (orientation: landscape) {
      body {
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 0;
      }

      #top-zone { display: none !important; }
      #bottom-zone { display: none !important; }
      #board-wrap { z-index: 1; flex-shrink: 0; }

      #game-board {
        width: auto;
        height: 90vh;
        max-height: 90vh;
        max-width: 70vw;
      }

      /* Left panel */
      #left-panel {
        display: flex !important;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        gap: 12px;
        padding: 0 14px;
        height: 90vh;
        z-index: 1;
        flex-shrink: 0;
        width: 15vw;
        min-width: 130px;
      }

      /* Right panel */
      #right-panel {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 12px;
        padding: 0 14px;
        height: 90vh;
        z-index: 1;
        flex-shrink: 0;
        width: 15vw;
        min-width: 130px;
      }

      /* Player card landscape */
      .player-card-land {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: 10px 14px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: white;
        font-family: 'Rajdhani', sans-serif;
        font-weight: 600;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 100%;
        transition: box-shadow 0.35s, border-color 0.35s;
      }
      .player-card-land.active-card {
        border-color: rgba(240,192,64,0.6);
        box-shadow: 0 0 18px rgba(240,192,64,0.3);
      }
      .player-card-land .player-dot { width: 18px; height: 18px; }
      .player-card-land .player-name { font-size: 0.9em; text-align: center; word-break: break-word; }
      .player-card-land .timer-val {
        font-family: 'Orbitron', sans-serif;
        font-size: 1em;
        font-weight: 700;
        color: var(--gold);
      }

      /* Timer shared landscape */
      .shared-land {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 8px 12px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        width: 100%;
      }
      .shared-land .shared-timer-val { font-size: 1em; }

      /* Util buttons landscape */
      .util-btn-land {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        color: white;
        width: 38px; height: 38px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        font-size: 1.1em;
        transition: background 0.2s;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .util-btn-land:hover { background: rgba(255,255,255,0.15); }

      .btn-demande-land {
        width: 100%;
        height: 38px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 0.8em;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 0 8px;
        border-radius: 10px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        color: white;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
      }
      .btn-demande-land:hover { background: rgba(255,255,255,0.15); }

      .ping-land {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 0 10px;
        height: 38px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        width: 100%;
        justify-content: center;
      }

      /* Stop button landscape — center right panel */
      #stop-move-btn-land {
        width: 56px; height: 56px;
        border-radius: 50%;
        background: linear-gradient(145deg, #ff4d6d, #c0002b);
        color: white;
        border: 3px solid rgba(255,255,255,0.7);
        font-size: 0.9em;
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
        pointer-events: none;
        box-shadow: 0 4px 20px rgba(192,0,43,0.3);
        letter-spacing: 0.05em;
        align-self: center;
      }
      #stop-move-btn-land.active {
        opacity: 1;
        transform: scale(1.08);
        box-shadow: 0 0 0 4px rgba(255,77,109,0.35), 0 6px 24px rgba(192,0,43,0.5);
        pointer-events: all;
      }
    }

    /* Hide landscape panels on portrait */
    #left-panel, #right-panel { display: none; }

    /* ─── Game over overlay ─── */
    .gameover-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }
    .gameover-box {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid rgba(240,192,64,0.35);
      border-radius: 22px;
      padding: 40px 44px;
      text-align: center;
      color: white;
      font-family: 'Rajdhani', sans-serif;
      box-shadow: 0 12px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset;
      max-width: 340px;
      width: 90vw;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .gameover-title {
      font-size: 1.8em;
      font-weight: 800;
      margin-bottom: 28px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.05em;
    }
    .gameover-btn {
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 52px;
      font-size: 1.05em;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 20px rgba(110,142,251,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gameover-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(110,142,251,0.55); }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <span>Fananganana ny lalao…</span>
  </div>

  <!-- ══ PORTRAIT: top zone ══ -->
  <div id="top-zone" style="display:none;">
    <!-- Player names row -->
    <div id="players-portrait">
      <div class="player-card left-card" id="p-card-left">
        <div class="player-dot" id="p-dot-left"></div>
        <span class="player-name" id="p-name-left">—</span>
      </div>
      <div class="player-card right-card" id="p-card-right">
        <span class="player-name" id="p-name-right">—</span>
        <div class="player-dot" id="p-dot-right"></div>
      </div>
    </div>

    <!-- Timers row -->
    <div id="timers-row">
      <div class="timer-card" id="timer-left">
        <span class="timer-icon">⏱</span>
        <span class="timer-val">∞</span>
      </div>
      <div class="timer-card" style="flex:0 0 auto; padding:0 16px;">
        <div class="shared-timer-wrap">
          <span class="shared-timer-label">shared</span>
          <span class="shared-timer-val">∞</span>
        </div>
      </div>
      <div class="timer-card" id="timer-right">
        <span class="timer-icon">⏱</span>
        <span class="timer-val">∞</span>
      </div>
    </div>

    <!-- Utility row -->
    <div id="utility-row">
      <div class="ping-display">
        <div class="ping-dot"></div>
        <span class="ping-label">PING</span>
      </div>
      <button class="util-btn" title="Message">💬</button>
      <button class="util-btn btn-demande">DEMANDE</button>
      <button class="util-btn" title="Paramètres">⚙️</button>
    </div>
  </div>

  <!-- ══ LANDSCAPE: left panel ══ -->
  <div id="left-panel">
    <!-- Opponent card -->
    <div class="player-card-land" id="land-opp-card">
      <div class="player-dot" id="land-opp-dot"></div>
      <span class="player-name" id="land-opp-name">—</span>
      <span class="timer-val">∞</span>
    </div>

    <!-- Shared timer -->
    <div class="shared-land">
      <span class="shared-timer-label">shared</span>
      <span class="shared-timer-val">∞</span>
    </div>

    <!-- My card -->
    <div class="player-card-land" id="land-my-card">
      <div class="player-dot" id="land-my-dot"></div>
      <span class="player-name" id="land-my-name">—</span>
      <span class="timer-val">∞</span>
    </div>
  </div>

  <!-- ══ Board ══ -->
  <div id="board-wrap">
    <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
      <defs>
        <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
        </pattern>
        <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
          <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
        </pattern>
        <pattern id="board-bg-pat" x="-50" y="-50" width="500" height="300" patternUnits="userSpaceOnUse">
          <image href="img/table-gray.png" x="-50" y="-50" width="500" height="300" preserveAspectRatio="xMidYMid slice"/>
        </pattern>
        <clipPath id="board-clip">
          <rect x="-50" y="-50" width="500" height="300" rx="22" ry="22"/>
        </clipPath>
      </defs>
      <!-- Board background image with border radius -->
      <rect x="-50" y="-50" width="500" height="300" fill="url(#board-bg-pat)" clip-path="url(#board-clip)" rx="22" ry="22"/>
      <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
        M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
        M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
        M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
        M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
        M300 0 L400 100 M400 0 L200 200
        M0 100 L100 200 M400 100 L300 200"/>
      <g id="guides-group"></g>
      <g id="pieces-group"></g>
      <g id="spots-group"></g>
    </svg>
  </div>

  <!-- ══ LANDSCAPE: right panel ══ -->
  <div id="right-panel">
    <!-- Utility buttons -->
    <button class="util-btn-land" title="Message">💬</button>
    <button class="util-btn-land" title="Paramètres">⚙️</button>
    <button class="btn-demande-land">DEMANDE</button>
    <div class="ping-land">
      <div class="ping-dot"></div>
      <span class="ping-label">PING</span>
    </div>
    <!-- OK button center -->
    <button id="stop-move-btn-land" style="display:none;">OK</button>
  </div>

  <!-- ══ PORTRAIT: bottom zone ══ -->
  <div id="bottom-zone" style="display:none;">
    <button id="stop-move-btn" style="display:none;">OK</button>
  </div>

  <div id="error-msg"></div>

  <script>
  (function () {

    //  SECTION 1 — Config & helpers
    var SESSION_API_URL = '/api/session';
    var GAME_API_URL    = '/api/game-fanorona';
    var POLL_INTERVAL   = 1500;
    var RECONCILE_DELAY = 5000;

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('loading-overlay').classList.add('hidden');
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var gameOverTriggered = false;
    function disableBoardCompletely() {
      var board = document.getElementById('game-board');
      if (board) board.classList.add('lock-board');
      getAllStopBtns().forEach(function(b){ b.classList.remove('active'); b.style.pointerEvents='none'; });
      document.getElementById('guides-group').innerHTML = '';
      document.querySelectorAll('.selected-piece,.movable-piece,.blocked-piece,.capture-target').forEach(function(el) {
        el.removeAttribute('class');
      });
      document.querySelectorAll('.cross-line').forEach(function(el) { el.remove(); });
    }

    function getAllStopBtns() {
      var btns = [];
      var b1 = document.getElementById('stop-move-btn');
      var b2 = document.getElementById('stop-move-btn-land');
      if (b1) btns.push(b1);
      if (b2) btns.push(b2);
      return btns;
    }

    function showGameOverAlert(winnerColor, delayMs) {
      if (gameOverTriggered) return;
      gameOverTriggered = true;
      disableBoardCompletely();
      var delay = (typeof delayMs === 'number') ? delayMs : 2000;
      setTimeout(function() {
        var overlay = document.createElement('div');
        overlay.className = 'gameover-overlay';

        var box = document.createElement('div');
        box.className = 'gameover-box';

        var iWon  = (winnerColor === myColor);
        var myMsg = iWon ? '🏆 You Win!' : '😔 You Lose!';

        var title = document.createElement('div');
        title.className = 'gameover-title';
        title.textContent = myMsg;

        var btn = document.createElement('button');
        btn.textContent = 'OK';
        btn.className = 'gameover-btn';
        btn.onclick = function() { window.location.href = 'dashboard.html'; };

        box.appendChild(title);
        box.appendChild(btn);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
      }, delay);
    }

    async function callApi(url, action, payload) {
      var r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action }, payload))
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'API error');
      return d;
    }

    //  SECTION 2 — Constantes du jeu
    var rows = ['A','B','C','D','E'];
    var cols = ['1','2','3','4','5','6','7','8','9'];

    var allowedMoves = {
      'A1':['A2','B1','B2'],'A2':['A1','A3','B2'],'A3':['A2','A4','B2','B3','B4'],
      'A4':['A3','A5','B4'],'A5':['A4','A6','B4','B5','B6'],'A6':['A5','A7','B6'],
      'A7':['A6','A8','B6','B7','B8'],'A8':['A7','A9','B8'],'A9':['A8','B8','B9'],
      'B1':['A1','B2','C1'],'B2':['A1','A2','A3','B1','B3','C1','C2','C3'],'B3':['A3','B2','B4','C3'],
      'B4':['A3','A4','A5','B3','B5','C3','C4','C5'],'B5':['A5','B4','B6','C5'],
      'B6':['A5','A6','A7','B5','B7','C5','C6','C7'],
      'B7':['A7','B6','B8','C7'],'B8':['A7','A8','A9','B7','B9','C7','C8','C9'],'B9':['A9','B8','C9'],
      'C1':['B1','B2','C2','D1','D2'],'C2':['B2','C1','C3','D2'],
      'C3':['B2','B3','B4','C2','C4','D2','D3','D4'],
      'C4':['B4','C3','C5','D4'],'C5':['B4','B5','B6','C4','C6','D4','D5','D6'],
      'C6':['B6','C5','C7','D6'],
      'C7':['B6','B7','B8','C6','C8','D6','D7','D8'],'C8':['B8','C7','C9','D8'],
      'C9':['B8','B9','C8','D8','D9'],
      'D1':['C1','D2','E1'],'D2':['C1','C2','C3','D1','D3','E1','E2','E3'],'D3':['C3','D2','D4','E3'],
      'D4':['C3','C4','C5','D3','D5','E3','E4','E5'],'D5':['C5','D4','D6','E5'],
      'D6':['C5','C6','C7','D5','D7','E5','E6','E7'],
      'D7':['C7','D6','D8','E7'],'D8':['C7','C8','C9','D7','D9','E7','E8','E9'],'D9':['C9','D8','E9'],
      'E1':['D1','D2','E2'],'E2':['D2','E1','E3'],'E3':['D2','D3','D4','E2','E4'],
      'E4':['D4','E3','E5'],'E5':['D4','D5','D6','E4','E6'],'E6':['D6','E5','E7'],
      'E7':['D6','D7','D8','E6','E8'],'E8':['D8','E7','E9'],'E9':['D8','D9','E8'],
    };

    //  SECTION 3 — État
    var myColor    = null;
    var myOppColor = null;
    var gameId     = null;
    var myUid      = null;
    var localState = null;
    var selectedSpot    = null;
    var lastBlockedSpot = null;
    var canChangePiece  = true;
    var pendingCaptures = { approach: [], withdrawal: [], moveData: null };
    var piecesOnBoard   = {};
    var moveQueue       = [];
    var movingInProgress = false;
    var lastSeenHistKey   = null;
    var reconcileTimer    = null;
    var myDotEl  = null;
    var oppDotEl = null;
    var myDotElLand  = null;
    var oppDotElLand = null;

    //  SECTION 4 — Init
    var params   = new URLSearchParams(window.location.search);
    var gameId_p = params.get('gameId');
    var color_p  = params.get('color');
    var inviteId = params.get('inviteId');
    var gameSource = params.get('source') || 'fanorona';

    async function init() {
      if (!gameId_p || !color_p || !inviteId) { showError('Diso ny fampidirana.'); return; }
      if (color_p !== 'maintso' && color_p !== 'mena') { showError('Diso ny color.'); return; }

      var stored = localStorage.getItem('user');
      if (!stored) { window.location.href = 'login&register.html'; return; }
      var localUser = null;
      try { localUser = JSON.parse(stored); } catch(e) {}
      if (!localUser || !localUser.uid) { window.location.href = 'login&register.html'; return; }

      try {
        var data = await callApi(SESSION_API_URL, 'get-fanorona-game', { uid: localUser.uid, gameId: gameId_p });
        if (!data.success) { showError('Tsy hita ny lalao.'); return; }

        myUid      = localUser.uid;
        gameId     = gameId_p;
        myColor    = color_p;
        myOppColor = color_p === 'maintso' ? 'mena' : 'maintso';

        renderPlayersBar(myColor, localUser.username || localUser.uid, data.opponentUsername || '???');

        if (myColor === 'mena') document.getElementById('game-board').classList.add('flipped');

        document.getElementById('game-board').style.display = 'block';

        // Show stop buttons
        getAllStopBtns().forEach(function(b){ b.style.display='flex'; });

        document.getElementById('loading-overlay').classList.add('hidden');

        // Show layout zones
        document.getElementById('top-zone').style.display    = 'flex';
        document.getElementById('bottom-zone').style.display = 'flex';

        drawBoardSpots();

        getAllStopBtns().forEach(function(b){
          b.onclick = function() { handleStopBtn(); };
        });

        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (d.success) {
          localState = copyState(d.game);
          applyLocalState();
        }

        setInterval(pollAdversaire, POLL_INTERVAL);

      } catch(err) { showError('Nisy olana: ' + err.message); }
    }

    //  SECTION 5 — Players bar
    function renderPlayersBar(myCol, myUsername, oppUsername) {
      var myDotClass  = myCol === 'maintso' ? 'dot-maintso' : 'dot-mena';
      var oppDotClass = myCol === 'maintso' ? 'dot-mena'    : 'dot-maintso';

      // Portrait left/right
      var pDotLeft  = document.getElementById('p-dot-left');
      var pDotRight = document.getElementById('p-dot-right');
      var pNameLeft  = document.getElementById('p-name-left');
      var pNameRight = document.getElementById('p-name-right');
      var pCardLeft  = document.getElementById('p-card-left');
      var pCardRight = document.getElementById('p-card-right');

      // Left = opponent, Right = me
      pDotLeft.className  = 'player-dot ' + oppDotClass;
      pDotRight.className = 'player-dot ' + myDotClass;
      pNameLeft.textContent  = escapeHtml(oppUsername);
      pNameRight.textContent = escapeHtml(myUsername);

      myDotEl  = pDotRight;
      oppDotEl = pDotLeft;

      // Landscape
      var lOppDot  = document.getElementById('land-opp-dot');
      var lMyDot   = document.getElementById('land-my-dot');
      var lOppName = document.getElementById('land-opp-name');
      var lMyName  = document.getElementById('land-my-name');
      if (lOppDot) lOppDot.className = 'player-dot ' + oppDotClass;
      if (lMyDot)  lMyDot.className  = 'player-dot ' + myDotClass;
      if (lOppName) lOppName.textContent = escapeHtml(oppUsername);
      if (lMyName)  lMyName.textContent  = escapeHtml(myUsername);
      myDotElLand  = lMyDot;
      oppDotElLand = lOppDot;
    }

    function updateTurnIndicator(turn) {
      // Portrait
      if (myDotEl && oppDotEl) {
        var myCardRight = document.getElementById('p-card-right');
        var myCardLeft  = document.getElementById('p-card-left');
        if (turn === myColor) {
          myDotEl.classList.add('active-turn');
          oppDotEl.classList.remove('active-turn');
          if (myCardRight)  myCardRight.classList.add('active-card');
          if (myCardLeft)   myCardLeft.classList.remove('active-card');
        } else {
          oppDotEl.classList.add('active-turn');
          myDotEl.classList.remove('active-turn');
          if (myCardLeft)  myCardLeft.classList.add('active-card');
          if (myCardRight) myCardRight.classList.remove('active-card');
        }
      }
      // Landscape
      var lMyCard  = document.getElementById('land-my-card');
      var lOppCard = document.getElementById('land-opp-card');
      if (myDotElLand && oppDotElLand) {
        if (turn === myColor) {
          myDotElLand.classList.add('active-turn');
          oppDotElLand.classList.remove('active-turn');
          if (lMyCard)  lMyCard.classList.add('active-card');
          if (lOppCard) lOppCard.classList.remove('active-card');
        } else {
          oppDotElLand.classList.add('active-turn');
          myDotElLand.classList.remove('active-turn');
          if (lOppCard) lOppCard.classList.add('active-card');
          if (lMyCard)  lMyCard.classList.remove('active-card');
        }
      }
    }

    //  SECTION 6 — Polling adversaire
    async function pollAdversaire() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;
        var serverTurn = d.game.turn;

        if (movingInProgress) return;

        if (serverTurn !== myColor) {
          if (localState) {
            localState.pieces = Object.assign({}, d.game.pieces);
            localState.turn   = d.game.turn;
            renderPieces(localState.pieces, localState);
          }
          return;
        }

        if (selectedSpot || (localState && localState.movingPiece)) return;

        var histColor = d.game.lastTurnColor || '';
        var history   = Array.isArray(d.game.lastTurnHistory) ? d.game.lastTurnHistory : [];
        var histKey   = histColor + '|' + history.length + '|' +
                        (history.length > 0 ? history[history.length - 1].target : '');

        if (histColor === myOppColor && history.length > 0 && histKey !== lastSeenHistKey) {
          lastSeenHistKey = histKey;
        }

        var serverPiecesStr = JSON.stringify(d.game.pieces);
        var localPiecesStr  = localState ? JSON.stringify(localState.pieces) : '';
        if (serverPiecesStr === localPiecesStr && localState && localState.turn === myColor) return;

        localState      = copyState(d.game);
        canChangePiece  = true;
        selectedSpot    = null;
        lastBlockedSpot = null;
        pendingCaptures = { approach: [], withdrawal: [], moveData: null };
        document.getElementById('guides-group').innerHTML = '';
        getAllStopBtns().forEach(function(b){ b.classList.remove('active'); });
        applyLocalState();

        var myPieceCountPoll  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
        var oppPieceCountPoll = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
        if (myPieceCountPoll === 0) {
          showGameOverAlert(myOppColor, 2000);
        } else if (oppPieceCountPoll === 0) {
          showGameOverAlert(myColor, 2000);
        }

      } catch(e) { console.warn('poll error', e); }
    }

    function copyState(game) {
      return {
        pieces:      Object.assign({}, game.pieces),
        turn:        game.turn,
        movingPiece: game.movingPiece || '',
        visited:     (game.visited || []).slice(),
        lastDir:     game.lastDir || '',
      };
    }

    function applyLocalState() {
      updateTurnIndicator(localState.turn);
      if (localState.turn === myColor && localState.movingPiece) {
        getAllStopBtns().forEach(function(b){ b.classList.add('active'); });
      } else if (!movingInProgress) {
        getAllStopBtns().forEach(function(b){ b.classList.remove('active'); });
      }
      renderPieces(localState.pieces, localState);
      if (selectedSpot && localState.turn === myColor) {
        renderGuides(selectedSpot, localState);
      }
    }

    //  SECTION 7 — Spots cliquables
    function drawBoardSpots() {
      var spotsGrp = document.getElementById('spots-group');
      spotsGrp.innerHTML = '';
      rows.forEach(function(r, ri) {
        cols.forEach(function(c, ci) {
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', ci * 50);
          circle.setAttribute('cy', ri * 50);
          circle.setAttribute('r', 18);
          circle.setAttribute('fill', 'transparent');
          circle.setAttribute('class', 'spot');
          (function(spotID) { circle.onclick = function(e) { e.stopPropagation(); handleSpotClick(spotID); }; })(r + c);
          spotsGrp.appendChild(circle);
        });
      });
    }

    function handleSpotClick(spotID) {
      if (!localState || localState.turn !== myColor) return;
      if (pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0) return;

      var pieces = localState.pieces;

      if (canChangePiece && pieces[spotID] === myColor) {
        if (canPieceMove(spotID, pieces, myColor, playerHasAnyCapture(pieces, myColor))) {
          selectedSpot    = spotID;
          lastBlockedSpot = null;
        } else {
          selectedSpot    = null;
          lastBlockedSpot = spotID;
        }
        renderGuides(selectedSpot || '', localState);
        renderPieces(pieces, localState);
        return;
      }

      if (!selectedSpot) return;
      if ((allowedMoves[selectedSpot] || []).indexOf(spotID) === -1) return;
      if (pieces[spotID]) return;
      if (localState.visited && localState.visited.indexOf(spotID) !== -1) return;

      var caps = getCaptures(pieces, selectedSpot, spotID, myColor);
      var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
      if (playerHasAnyCapture(pieces, myColor) && !isCaptureMove) return;

      var r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]);
      var r2 = rows.indexOf(spotID[0]),       c2 = cols.indexOf(spotID[1]);
      var dir = (r2-r1) + ',' + (c2-c1);
      if (!canChangePiece && localState.lastDir === dir) return;

      var origin     = selectedSpot;
      var newPieces  = Object.assign({}, pieces);
      delete newPieces[origin];
      newPieces[spotID] = myColor;
      var newVisited = (localState.visited || []).concat([origin]);

      if (isCaptureMove && caps.approach.length > 0 && caps.withdrawal.length > 0) {
        pendingCaptures = {
          approach:   caps.approach,
          withdrawal: caps.withdrawal,
          moveData:   { origin: origin, target: spotID, dir: dir }
        };
        localState.pieces  = newPieces;
        localState.visited = newVisited;
        selectedSpot = spotID;
        renderPieces(newPieces, localState);
        document.getElementById('guides-group').innerHTML = '';
        return;
      }

      var capturedSpots = isCaptureMove ? caps.approach.concat(caps.withdrawal) : [];
      doMove(origin, spotID, capturedSpots, dir, newVisited, newPieces, isCaptureMove);
    }

    function confirmCapture(type) {
      var md = pendingCaptures.moveData;
      var capturedSpots = type === 'approach' ? pendingCaptures.approach : pendingCaptures.withdrawal;
      pendingCaptures = { approach: [], withdrawal: [], moveData: null };
      var newPieces  = Object.assign({}, localState.pieces);
      var newVisited = (localState.visited || []).slice();
      doMove(md.origin, md.target, capturedSpots, md.dir, newVisited, newPieces, true);
    }

    function doMove(origin, target, capturedSpots, dir, newVisited, newPieces, wasCapture) {
      capturedSpots.forEach(function(s) { delete newPieces[s]; });
      var canContinue = wasCapture && checkAvailableCaptures(newPieces, target, newVisited, dir, myColor);
      movingInProgress = true;
      localState.pieces = newPieces;

      if (canContinue) {
        localState.movingPiece = target;
        localState.visited     = newVisited;
        localState.lastDir     = dir;
        selectedSpot   = target;
        canChangePiece = false;
        getAllStopBtns().forEach(function(b){ b.classList.add('active'); });
      } else {
        localState.turn        = myOppColor;
        localState.movingPiece = '';
        localState.visited     = [];
        localState.lastDir     = '';
        selectedSpot    = null;
        lastBlockedSpot = null;
        canChangePiece  = true;
        getAllStopBtns().forEach(function(b){ b.classList.remove('active'); });
      }

      if (canContinue && selectedSpot) {
        renderGuides(selectedSpot, localState);
      } else {
        document.getElementById('guides-group').innerHTML = '';
      }

      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);
      sendMoveToBackend(origin, target, capturedSpots, dir);
      if (!canContinue) scheduleReconcile();

      if (!canContinue) {
        var myPieceCount  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
        var oppPieceCount = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
        if (oppPieceCount === 0) {
          showGameOverAlert(myColor, 2000);
        } else if (myPieceCount === 0) {
          showGameOverAlert(myOppColor, 2000);
        }
      }
    }

    function handleStopBtn() {
      if (!localState || localState.turn !== myColor || !localState.movingPiece) return;
      var piecesSnapshot = Object.assign({}, localState.pieces);
      movingInProgress = true;
      localState.turn        = myOppColor;
      localState.movingPiece = '';
      localState.visited     = [];
      localState.lastDir     = '';
      selectedSpot    = null;
      lastBlockedSpot = null;
      canChangePiece  = true;
      getAllStopBtns().forEach(function(b){ b.classList.remove('active'); });
      document.getElementById('guides-group').innerHTML = '';
      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);
      callApi(GAME_API_URL, 'stop-move', { uid: myUid, gameId: gameId, pieces: piecesSnapshot })
        .catch(function(e) { console.warn('stop-move error', e); });
      scheduleReconcile();
      var myPieceCountS  = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myColor; }).length;
      var oppPieceCountS = Object.keys(localState.pieces).filter(function(s){ return localState.pieces[s]===myOppColor; }).length;
      if (oppPieceCountS === 0) {
        showGameOverAlert(myColor, 2000);
      } else if (myPieceCountS === 0) {
        showGameOverAlert(myOppColor, 2000);
      }
    }

    function sendMoveToBackend(origin, target, capturedSpots, dir) {
      callApi(GAME_API_URL, 'make-move', {
        uid: myUid, gameId: gameId,
        origin: origin, target: target,
        capturedSpots: capturedSpots, dir: dir
      }).catch(function(e) {
        console.warn('make-move backend error (non-blocking):', e);
      });
    }

    function scheduleReconcile() {
      if (reconcileTimer) clearTimeout(reconcileTimer);
      reconcileTimer = setTimeout(function() {
        reconcileTimer = null;
        doReconcile();
      }, RECONCILE_DELAY);
    }

    async function doReconcile() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;
        movingInProgress = false;
        var serverTurn = d.game.turn;

        if (serverTurn !== myColor) {
          if (localState.turn !== myColor) return;
          localState = copyState(d.game);
          selectedSpot    = null;
          lastBlockedSpot = null;
          canChangePiece  = true;
          pendingCaptures = { approach: [], withdrawal: [], moveData: null };
          document.getElementById('guides-group').innerHTML = '';
          getAllStopBtns().forEach(function(b){ b.classList.remove('active'); });
          applyLocalState();
        } else {
          var serverMoving = d.game.movingPiece || '';
          if (serverMoving) {
            selectedSpot   = localState.movingPiece || serverMoving;
            canChangePiece = false;
            localState.movingPiece = selectedSpot;
            document.getElementById('stop-move-btn') && document.getElementById('stop-move-btn').classList.add('active');
            document.getElementById('stop-move-btn-land') && document.getElementById('stop-move-btn-land').classList.add('active');
          }
          if (selectedSpot) renderGuides(selectedSpot, localState);
          renderPieces(localState.pieces, localState);
          updateTurnIndicator(localState.turn);
        }
      } catch(e) {
        movingInProgress = false;
        console.warn('reconcile error', e);
      }
    }

    //  SECTION 10 — Render pieces
    function renderPieces(pieces, stateData) {
      var grp           = document.getElementById('pieces-group');
      var isMyTurn      = stateData.turn === myColor;
      var globalCapture = playerHasAnyCapture(pieces, myColor);

      var newPiecesOnBoard = {};
      var vanished = Object.keys(piecesOnBoard).filter(function(k) { return !pieces[k]; });
      var appeared = Object.keys(pieces).filter(function(k) { return !piecesOnBoard[k]; });

      vanished.forEach(function(vKey) {
        var color  = piecesOnBoard[vKey].color;
        var target = null;
        for (var i = 0; i < appeared.length; i++) {
          if (pieces[appeared[i]] === color) { target = appeared[i]; break; }
        }
        if (target) {
          newPiecesOnBoard[target] = piecesOnBoard[vKey];
          appeared = appeared.filter(function(a) { return a !== target; });
        } else {
          piecesOnBoard[vKey].el.remove();
        }
      });

      appeared.forEach(function(aKey) {
        var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'piece-group');
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('r', 8);
        g.appendChild(c);
        grp.appendChild(g);
        newPiecesOnBoard[aKey] = { el: g, color: pieces[aKey] };
      });

      Object.keys(pieces).forEach(function(k) {
        if (!newPiecesOnBoard[k]) newPiecesOnBoard[k] = piecesOnBoard[k];
      });
      piecesOnBoard = newPiecesOnBoard;

      var hasPending = pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0;

      Object.keys(pieces).forEach(function(spot) {
        var ri = rows.indexOf(spot[0]), ci = cols.indexOf(spot[1]);
        if (ri < 0 || ci < 0) return;
        var entry = piecesOnBoard[spot];
        if (!entry) return;
        var g = entry.el, circle = g.querySelector('circle');

        var svgX = ci * 50;
        var svgY = ri * 50;
        g.setAttribute('transform', 'translate(' + svgX + ',' + svgY + ')');
        circle.setAttribute('fill', 'url(#' + pieces[spot] + '-pat)');
        circle.removeAttribute('class');
        circle.style.pointerEvents = 'all';
        circle.onclick = (function(s) {
          return function(e) { e.stopPropagation(); handleSpotClick(s); };
        })(spot);

        if (isMyTurn && pieces[spot] === myColor) {
          if (selectedSpot === spot)
            circle.setAttribute('class', 'selected-piece');
          else if (lastBlockedSpot === spot)
            circle.setAttribute('class', 'blocked-piece');
          else if (!stateData.movingPiece && canPieceMove(spot, pieces, myColor, globalCapture))
            circle.setAttribute('class', 'movable-piece');
        }

        var isApp  = pendingCaptures.approach.indexOf(spot)   !== -1;
        var isWith = pendingCaptures.withdrawal.indexOf(spot) !== -1;
        g.querySelectorAll('.cross-line').forEach(function(l) { l.remove(); });

        if (isApp || isWith) {
          circle.classList.add('capture-target');
          circle.style.pointerEvents = 'all';
          var ct = isApp ? 'approach' : 'withdrawal';
          circle.onclick = (function(type) {
            return function(e) { e.stopPropagation(); confirmCapture(type); };
          })(ct);
          g.appendChild(createCross(-5,-5,5,5));
          g.appendChild(createCross(5,-5,-5,5));
        }
      });

      var board = document.getElementById('game-board');
      if (!isMyTurn || hasPending) board.classList.add('lock-board');
      else board.classList.remove('lock-board');
    }

    function createCross(x1,y1,x2,y2) {
      var l = document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('class','cross-line');
      return l;
    }

    function renderGuides(startSpot, stateData) {
      var grp = document.getElementById('guides-group');
      if (!grp) return;
      grp.innerHTML = '';
      if (!startSpot) return;
      var pieces  = stateData.pieces;
      var visited = stateData.visited  || [];
      var lastDir = stateData.lastDir  || '';
      var globalCapturePossible = playerHasAnyCapture(pieces, myColor);
      var moves = allowedMoves[startSpot] || [];
      moves.forEach(function(target) {
        if (pieces[target] || visited.indexOf(target) !== -1) return;
        var caps = getCaptures(pieces, startSpot, target, myColor);
        var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
        if (globalCapturePossible && !isCaptureMove) return;
        var r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
        var r2 = rows.indexOf(target[0]),    c2 = cols.indexOf(target[1]);
        var dir = (r2-r1) + ',' + (c2-c1);
        if (!canChangePiece && lastDir === dir) return;
        var svgX = c2 * 50;
        var svgY = r2 * 50;
        var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', svgX); dot.setAttribute('cy', svgY);
        dot.setAttribute('r', 6); dot.setAttribute('class', 'guide-dot');
        grp.appendChild(dot);
      });
    }

    function getCaptures(pieces, s, e, color) {
      var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(e[0]),c2=cols.indexOf(e[1]);
      var enemy=color==='maintso'?'mena':'maintso', dr=r2-r1, dc=c2-c1;
      function scan(row,col,sr,sc) {
        var res=[],cr=row+sr,cc=col+sc;
        while(cr>=0&&cr<5&&cc>=0&&cc<9&&pieces[rows[cr]+cols[cc]]===enemy){res.push(rows[cr]+cols[cc]);cr+=sr;cc+=sc;}
        return res;
      }
      return { approach: scan(r2,c2,dr,dc), withdrawal: scan(r1,c1,-dr,-dc) };
    }

    function playerHasAnyCapture(pieces, color) {
      var sl = Object.keys(pieces);
      for (var i=0;i<sl.length;i++) {
        var s=sl[i]; if(pieces[s]!==color)continue;
        var mv=allowedMoves[s]||[];
        for (var j=0;j<mv.length;j++) {
          var t=mv[j]; if(!pieces[t]){var c=getCaptures(pieces,s,t,color);if(c.approach.length>0||c.withdrawal.length>0)return true;}
        }
      }
      return false;
    }

    function canPieceMove(spot, pieces, color, globalCapture) {
      var mv=allowedMoves[spot]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i]; if(pieces[t])continue;
        var caps=getCaptures(pieces,spot,t,color);
        var isCap=caps.approach.length>0||caps.withdrawal.length>0;
        if(globalCapture?isCap:true)return true;
      }
      return false;
    }

    function checkAvailableCaptures(pieces, s, visited, lastDir, color) {
      var mv=allowedMoves[s]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i];
        if(pieces[t]||(visited&&visited.indexOf(t)!==-1))continue;
        var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(t[0]),c2=cols.indexOf(t[1]);
        var dir=(r2-r1)+','+(c2-c1);
        if(lastDir&&lastDir===dir)continue;
        var caps=getCaptures(pieces,s,t,color);
        if(caps.approach.length>0||caps.withdrawal.length>0)return true;
      }
      return false;
    }

    init();

  })();
  </script>
</body>
</html>
