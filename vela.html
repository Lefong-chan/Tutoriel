<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanorona</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: sans-serif;
      margin: 0; padding: 0;
      background: #0092FF;
      overflow: hidden;
      height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }

    /* ── Bande joueurs ── */
    #players-bar {
      display: flex; justify-content: space-between; align-items: center;
      width: 95vw; max-width: 800px;
      margin-bottom: 8px; padding: 8px 14px;
      background: rgba(0,0,0,0.25); border-radius: 12px;
      color: white; font-size: 1em; font-weight: 700; min-height: 44px;
    }
    .player-info { display: flex; align-items: center; gap: 8px; }
    .player-dot  { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.6); transition: box-shadow 0.3s; }
    .dot-maintso { background: #22c55e; }
    .dot-mena    { background: #ef4444; }
    .player-dot.active-turn { box-shadow: 0 0 0 3px white, 0 0 10px 3px rgba(255,255,255,0.7); }
    .player-name  { font-size: 0.95em; }
    .vs-sep { font-size: 0.85em; opacity: 0.6; font-weight: 400; }

    /* ── Plateau ── */
    #game-board { width: 95vw; max-width: 800px; max-height: 68vh; display: block; }
    .grid-line { stroke: #333; stroke-width: 2; }

    /* ── Pièces & interactions ── */
    .flipped { transform: rotate(180deg); }
    .piece-group { transition: transform 0.22s ease-in-out; }
    .piece-group.no-transition { transition: none; }
    .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece  { stroke: #ADFF2F; stroke-width: 5px; paint-order: stroke; }
    .blocked-piece  { stroke: #FF4500; stroke-width: 5px; paint-order: stroke; }
    .capture-target {
      stroke: darkorange; stroke-width: 5px; cursor: pointer;
      pointer-events: all !important; stroke-dasharray: 5;
      animation: dash 1s linear infinite;
    }
    @keyframes dash { to { stroke-dashoffset: 10; } }
    .spot { cursor: pointer; pointer-events: all; }
    .lock-board .spot { pointer-events: none !important; }
    .cross-line { stroke: white; stroke-width: 2; stroke-linecap: round; pointer-events: none; }
    .guide-dot  { fill: #FFF700; opacity: 0.8; pointer-events: none; }

    /* ── Bouton Stop ── */
    #stop-move-btn {
      width: 60px; height: 60px; border-radius: 50%;
      background: #f44336; color: white; border: 4px solid white;
      font-size: 30px; font-weight: bold; cursor: pointer;
      margin-top: 20px; opacity: 0.3; transition: 0.3s; pointer-events: none;
    }
    #stop-move-btn.active {
      opacity: 1; transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.5); pointer-events: all;
    }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed; inset: 0; background: #0092FF;
      display: flex; justify-content: center; align-items: center;
      z-index: 100; color: white; font-size: 1.2em; font-weight: 700;
      flex-direction: column; gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Erreur ── */
    #error-msg { display: none; color: #fef08a; font-size: 1em; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

  <div id="loading-overlay"><div class="spinner"></div><span>Fananganana ny lalao…</span></div>

  <div id="players-bar" style="display:none;"></div>

  <svg id="game-board" viewBox="-50 -50 500 300" style="display:none;">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="img/button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>
    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400
      M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200
      M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200
      M0 0 L200 200 M100 0 L0 100 M100 0 L300 200
      M200 0 L0 200 M200 0 L400 200 M300 0 L100 200
      M300 0 L400 100 M400 0 L200 200
      M0 100 L100 200 M400 100 L300 200"/>
    <g id="guides-group"></g>
    <g id="pieces-group"></g>
    <g id="spots-group"></g>
  </svg>

  <button id="stop-move-btn" style="display:none;">OK</button>
  <div id="error-msg"></div>

  <script>
  (function () {

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 1 — Config & helpers
    // ═══════════════════════════════════════════════════════════════

    var SESSION_API_URL = '/api/session';
    var GAME_API_URL    = '/api/game-vela';   // ← soloina ho game-vela
    var POLL_INTERVAL   = 1500;
    // Délai après dernier mouvement avant de vérifier la cohérence backend
    var RECONCILE_DELAY = 5000;

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('loading-overlay').classList.add('hidden');
    }
    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    async function callApi(url, action, payload) {
      var r = await fetch(url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action }, payload))
      });
      var d = await r.json();
      if (!r.ok) throw new Error(d.error || 'API error');
      return d;
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 2 — Constantes du jeu
    // ═══════════════════════════════════════════════════════════════

    var rows = ['A','B','C','D','E'];
    var cols = ['1','2','3','4','5','6','7','8','9'];

    var allowedMoves = {
      'A1':['A2','B1','B2'],'A2':['A1','A3','B2'],'A3':['A2','A4','B2','B3','B4'],
      'A4':['A3','A5','B4'],'A5':['A4','A6','B4','B5','B6'],'A6':['A5','A7','B6'],
      'A7':['A6','A8','B6','B7','B8'],'A8':['A7','A9','B8'],'A9':['A8','B8','B9'],
      'B1':['A1','B2','C1'],'B2':['A1','A2','A3','B1','B3','C1','C2','C3'],'B3':['A3','B2','B4','C3'],
      'B4':['A3','A4','A5','B3','B5','C3','C4','C5'],'B5':['A5','B4','B6','C5'],
      'B6':['A5','A6','A7','B5','B7','C5','C6','C7'],
      'B7':['A7','B6','B8','C7'],'B8':['A7','A8','A9','B7','B9','C7','C8','C9'],'B9':['A9','B8','C9'],
      'C1':['B1','B2','C2','D1','D2'],'C2':['B2','C1','C3','D2'],
      'C3':['B2','B3','B4','C2','C4','D2','D3','D4'],
      'C4':['B4','C3','C5','D4'],'C5':['B4','B5','B6','C4','C6','D4','D5','D6'],
      'C6':['B6','C5','C7','D6'],
      'C7':['B6','B7','B8','C6','C8','D6','D7','D8'],'C8':['B8','C7','C9','D8'],
      'C9':['B8','B9','C8','D8','D9'],
      'D1':['C1','D2','E1'],'D2':['C1','C2','C3','D1','D3','E1','E2','E3'],'D3':['C3','D2','D4','E3'],
      'D4':['C3','C4','C5','D3','D5','E3','E4','E5'],'D5':['C5','D4','D6','E5'],
      'D6':['C5','C6','C7','D5','D7','E5','E6','E7'],
      'D7':['C7','D6','D8','E7'],'D8':['C7','C8','C9','D7','D9','E7','E8','E9'],'D9':['C9','D8','E9'],
      'E1':['D1','D2','E2'],'E2':['D2','E1','E3'],'E3':['D2','D3','D4','E2','E4'],
      'E4':['D4','E3','E5'],'E5':['D4','D5','D6','E4','E6'],'E6':['D6','E5','E7'],
      'E7':['D6','D7','D8','E6','E8'],'E8':['D8','E7','E9'],'E9':['D8','D9','E8'],
    };

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 3 — État
    // ═══════════════════════════════════════════════════════════════

    var myColor    = null;
    var myOppColor = null;
    var gameId     = null;
    var myUid      = null;

    // localState : état du board affiché (optimistic)
    var localState = null;

    var selectedSpot    = null;
    var lastBlockedSpot = null;
    var canChangePiece  = true;
    var pendingCaptures = { approach: [], withdrawal: [], moveData: null };

    var piecesOnBoard = {};

    // File des mouvements envoyés au backend (en attente de confirmation)
    // Chaque entrée : { origin, target, capturedSpots, dir, promise }
    var moveQueue       = [];
    // Nombre de mouvements dans le turn en cours (pour savoir si on est en plein mouvement)
    var movingInProgress = false;

    // Fanalahidian'ny hetsika farany niseho (mba tsy hiseho indroa)
    var lastSeenHistKey   = null;

    // Timer de réconciliation post-mouvement
    var reconcileTimer = null;

    var myDotEl  = null;
    var oppDotEl = null;

    // firstMover : izay color nanetsika voalohany indrindra tamin'ny lalao.
    // Io color io ihany no afaka manala pièce (capture).
    // Set iray mandeha rehefa tonga avy amin'ny server (tsy azo ovaina).
    // Mbola tsy nisy hetsika raha null.
    //
    // Lojika: raha myColor !== firstMover → capturedSpots = [] foana ao amin'ny doMove.
    // (Ny lojika manala pièce ao amin'ny doMove dia voasoratra fa disabled raha tsy firstMover)
    var firstMover = null;

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 4 — Init
    // ═══════════════════════════════════════════════════════════════

    var params   = new URLSearchParams(window.location.search);
    var gameId_p = params.get('gameId');
    var color_p  = params.get('color');
    var inviteId = params.get('inviteId');

    async function init() {
      if (!gameId_p || !color_p || !inviteId) { showError('Diso ny fampidirana.'); return; }
      if (color_p !== 'maintso' && color_p !== 'mena') { showError('Diso ny color.'); return; }

      var stored = localStorage.getItem('user');
      if (!stored) { window.location.href = 'login&register.html'; return; }
      var localUser = null;
      try { localUser = JSON.parse(stored); } catch(e) {}
      if (!localUser || !localUser.uid) { window.location.href = 'login&register.html'; return; }

      try {
        var data = await callApi(SESSION_API_URL, 'get-fanorona-game', { uid: localUser.uid, gameId: gameId_p });
        if (!data.success) { showError('Tsy hita ny lalao.'); return; }

        myUid      = localUser.uid;
        gameId     = gameId_p;
        myColor    = color_p;
        myOppColor = color_p === 'maintso' ? 'mena' : 'maintso';

        renderPlayersBar(myColor, localUser.username || localUser.uid, data.opponentUsername || '???');

        if (myColor === 'mena') document.getElementById('game-board').classList.add('flipped');

        document.getElementById('game-board').style.display    = 'block';
        document.getElementById('stop-move-btn').style.display = 'block';
        document.getElementById('loading-overlay').classList.add('hidden');

        drawBoardSpots();

        document.getElementById('stop-move-btn').onclick = function() { handleStopBtn(); };

        // Premier chargement bloquant
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (d.success) {
          localState = copyState(d.game);
          // Set firstMover avy amin'ny server raha efa misy
          if (d.game.firstMover) firstMover = d.game.firstMover;
          applyLocalState();
        }

        // Polling adversaire
        setInterval(pollAdversaire, POLL_INTERVAL);

      } catch(err) { showError('Nisy olana: ' + err.message); }
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 5 — Players bar
    // ═══════════════════════════════════════════════════════════════

    function renderPlayersBar(myCol, myUsername, oppUsername) {
      var bar = document.getElementById('players-bar');
      var myDotClass  = myCol === 'maintso' ? 'dot-maintso' : 'dot-mena';
      var oppDotClass = myCol === 'maintso' ? 'dot-mena'    : 'dot-maintso';
      bar.innerHTML =
        '<div class="player-info">' +
          '<div class="player-dot ' + oppDotClass + '" id="opp-dot"></div>' +
          '<span class="player-name">' + escapeHtml(oppUsername) + '</span>' +
        '</div>' +
        '<span class="vs-sep">VS</span>' +
        '<div class="player-info">' +
          '<span class="player-name">' + escapeHtml(myUsername) + '</span>' +
          '<div class="player-dot ' + myDotClass + '" id="my-dot"></div>' +
        '</div>';
      bar.style.display = 'flex';
      myDotEl  = document.getElementById('my-dot');
      oppDotEl = document.getElementById('opp-dot');
    }

    function updateTurnIndicator(turn) {
      if (!myDotEl || !oppDotEl) return;
      if (turn === myColor) {
        myDotEl.classList.add('active-turn'); oppDotEl.classList.remove('active-turn');
      } else {
        oppDotEl.classList.add('active-turn'); myDotEl.classList.remove('active-turn');
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 6 — Polling adversaire UNIQUEMENT
    //  (ne modifie le state local que si c'est le tour de l'adversaire
    //   OU si aucun mouvement n'est en cours côté joueur)
    // ═══════════════════════════════════════════════════════════════

    async function pollAdversaire() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;
        var serverTurn = d.game.turn;

        // Ne rien écraser pendant un mouvement local
        if (movingInProgress) return;

        // Raha mbola tsy tour anao → adversaire manao hetsika
        // Havaozina ny pieces mba hita ny pio nalehany (tsy replay, tsy trail)
        if (serverTurn !== myColor) {
          if (localState) {
            localState.pieces = Object.assign({}, d.game.pieces);
            localState.turn   = d.game.turn;
            renderPieces(localState.pieces, localState);
          }
          return;
        }

        // Tour anao — raha efa manao hetsika ianao (misy selectedSpot na movingPiece),
        // tsy ovaina ny state mba tsy hanafoana ny selection nataonao
        if (selectedSpot || (localState && localState.movingPiece)) return;

        // Tonga eto fotsiny raha tour anao SY tsy mbola nanao selection ianao
        var histColor = d.game.lastTurnColor || '';
        var history   = Array.isArray(d.game.lastTurnHistory) ? d.game.lastTurnHistory : [];
        var histKey   = histColor + '|' + history.length + '|' +
                        (history.length > 0 ? history[history.length - 1].target : '');

        if (histColor === myOppColor && history.length > 0 && histKey !== lastSeenHistKey) {
          lastSeenHistKey = histKey;
        }

        // Havaozina ny localState fotsiny raha tena nisy fanovana
        var serverPiecesStr = JSON.stringify(d.game.pieces);
        var localPiecesStr  = localState ? JSON.stringify(localState.pieces) : '';
        if (serverPiecesStr === localPiecesStr && localState && localState.turn === myColor) return;

        localState      = copyState(d.game);
        // Set firstMover avy amin'ny server (iray mandeha, tsy azo ovaina)
        if (firstMover === null && d.game.firstMover) {
          firstMover = d.game.firstMover;
        }
        canChangePiece  = true;
        selectedSpot    = null;
        lastBlockedSpot = null;
        pendingCaptures = { approach: [], withdrawal: [], moveData: null };
        document.getElementById('guides-group').innerHTML = '';
        document.getElementById('stop-move-btn').classList.remove('active');
        applyLocalState();

      } catch(e) { console.warn('poll error', e); }
    }

    function copyState(game) {
      return {
        pieces:      Object.assign({}, game.pieces),
        turn:        game.turn,
        movingPiece: game.movingPiece || '',
        visited:     (game.visited || []).slice(),
        lastDir:     game.lastDir || '',
        firstMover:  game.firstMover || null,
      };
    }

    function applyLocalState() {
      updateTurnIndicator(localState.turn);
      var stopBtn = document.getElementById('stop-move-btn');
      if (localState.turn === myColor && localState.movingPiece) {
        stopBtn.classList.add('active');
      } else if (!movingInProgress) {
        stopBtn.classList.remove('active');
      }
      renderPieces(localState.pieces, localState);
      // Toujours afficher les guides si une pièce est sélectionnée
      if (selectedSpot && localState.turn === myColor) {
        renderGuides(selectedSpot, localState);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 7 — Spots cliquables
    // ═══════════════════════════════════════════════════════════════

    function drawBoardSpots() {
      var spotsGrp = document.getElementById('spots-group');
      spotsGrp.innerHTML = '';
      rows.forEach(function(r, ri) {
        cols.forEach(function(c, ci) {
          var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', ci * 50);
          circle.setAttribute('cy', ri * 50);
          circle.setAttribute('r', 18);
          circle.setAttribute('fill', 'transparent');
          circle.setAttribute('class', 'spot');
          (function(spotID) { circle.onclick = function(e) { e.stopPropagation(); handleSpotClick(spotID); }; })(r + c);
          spotsGrp.appendChild(circle);
        });
      });
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 8 — Gestion des clics (Optimistic UI)
    // ═══════════════════════════════════════════════════════════════

    function handleSpotClick(spotID) {
      if (!localState || localState.turn !== myColor) return;
      if (pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0) return;

      var pieces = localState.pieces;

      // ── Sélection d'une pièce ──────────────────────────────────
      if (canChangePiece && pieces[spotID] === myColor) {
        // FIRST MOVER CHECK :
        // Raha firstMover → canPieceMove mijery capture (lojika normal)
        // Raha tsy firstMover → canPieceMove tsy mila capture (globalCapture=false)
        // (Ny lojika playerHasAnyCapture dia voasoratra fa DISABLED ho an'ilay tsy firstMover)
        var amIFirstMover = (firstMover === null || firstMover === myColor);
        var globalCap = amIFirstMover ? playerHasAnyCapture(pieces, myColor) : false;
        if (canPieceMove(spotID, pieces, myColor, globalCap)) {
          selectedSpot    = spotID;
          lastBlockedSpot = null;
        } else {
          selectedSpot    = null;
          lastBlockedSpot = spotID;
        }
        // Guide affiché immédiatement
        renderGuides(selectedSpot || '', localState);
        renderPieces(pieces, localState);
        return;
      }

      // ── Déplacement ────────────────────────────────────────────
      if (!selectedSpot) return;
      if ((allowedMoves[selectedSpot] || []).indexOf(spotID) === -1) return;
      if (pieces[spotID]) return;
      if (localState.visited && localState.visited.indexOf(spotID) !== -1) return;

      var caps = getCaptures(pieces, selectedSpot, spotID, myColor);
      var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
      // FIRST MOVER CHECK :
      // Raha firstMover → tsy afaka mandeha raha misy capture azo atao nefa tsy capture ny hetsika
      // Raha tsy firstMover → afaka mandeha any na aiza na aiza (tsy voatery capture)
      // (Ny fepetra playerHasAnyCapture dia voasoratra fa DISABLED ho an'ilay tsy firstMover)
      var amIFirstMover2 = (firstMover === null || firstMover === myColor);
      if (amIFirstMover2 && playerHasAnyCapture(pieces, myColor) && !isCaptureMove) return;

      var r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]);
      var r2 = rows.indexOf(spotID[0]),       c2 = cols.indexOf(spotID[1]);
      var dir = (r2-r1) + ',' + (c2-c1);
      if (!canChangePiece && localState.lastDir === dir) return;

      var origin     = selectedSpot;
      var newPieces  = Object.assign({}, pieces);
      delete newPieces[origin];
      newPieces[spotID] = myColor;
      var newVisited = (localState.visited || []).concat([origin]);

      // ── FIRST MOVER CHECK — choix approach/withdrawal ────────────────────
      // firstMover    → misafidy approach na withdrawal (lojika normal)
      // tsy firstMover → tsy misafidy, mandeha avy hatrany tsy misy capture
      //   (Ny lojika pendingCaptures dia voasoratra fa DISABLED ho an'ilay tsy firstMover)
      var amIFirstMoverC = (firstMover === null || firstMover === myColor);

      if (amIFirstMoverC && isCaptureMove && caps.approach.length > 0 && caps.withdrawal.length > 0) {
        // firstMover + approach sy withdrawal roa → misafidy
        pendingCaptures = {
          approach:   caps.approach,
          withdrawal: caps.withdrawal,
          moveData:   { origin: origin, target: spotID, dir: dir }
        };
        localState.pieces  = newPieces;
        localState.visited = newVisited;
        selectedSpot = spotID;
        renderPieces(newPieces, localState);
        // Guides vides pendant le choix
        document.getElementById('guides-group').innerHTML = '';
        return;
      }

      // tsy firstMover → capturedSpots = [] foana (tsy misy capture)
      // firstMover + iray monja (approach na withdrawal) → normal
      var capturedSpots = (amIFirstMoverC && isCaptureMove)
        ? caps.approach.concat(caps.withdrawal)
        : [];
      doMove(origin, spotID, capturedSpots, dir, newVisited, newPieces, isCaptureMove);
    }

    // confirmCapture : rehefa misy approach sy withdrawal roa,
    // ny player dia misafidy iray. Rehefa avy nisafidy → doMove no atao.
    // AUTO-OK : doMove eto koa dia AUTO-OK (canContinue=false foana).
    //
    // PIÈCE IRAY MONJA : nalefa ny capturedSpots feno any amin'ny doMove,
    // fa ao anatin'ny doMove ihany no esorina ny voalohany fotsiny.
    // (Ny lojika manala pièce maro tao aloha dia tsy esorina, fa disabled)
    function confirmCapture(type) {
      var md = pendingCaptures.moveData;
      var capturedSpots = type === 'approach' ? pendingCaptures.approach : pendingCaptures.withdrawal;
      pendingCaptures = { approach: [], withdrawal: [], moveData: null };
      var newPieces  = Object.assign({}, localState.pieces);
      var newVisited = (localState.visited || []).slice();
      doMove(md.origin, md.target, capturedSpots, md.dir, newVisited, newPieces, true);
    }

    // ─── Cœur : appliquer un mouvement localement + envoyer au backend ─────
    //
    // AUTO-OK : rehefa tsy misy continuation, ny turn dia mifindra avy hatrany.
    // Ny lojika multi-capture dia voasoratra fa MBOLA TSY AMPIASAINA.
    // Rehefa hampiana → ovana ny backend flag (AUTO_OK_ALWAYS=false) ary
    //   soloina ity andalana ity: var canContinue = wasCapture && checkAvailableCaptures(...)
    //
    function doMove(origin, target, capturedSpots, dir, newVisited, newPieces, wasCapture) {
      // ── FIRST MOVER ihany no afaka manala pièce ───────────────────────────
      // Raha myColor === firstMover (na mbola tsy set) → capture normal
      // Raha myColor !== firstMover → capturedSpots voatery ho [] (tsy misy capture)
      //
      // Ny lojika manala pièce (capturedSpots[0]) dia voasoratra fa
      // DISABLED raha tsy firstMover — rehefa hampiana ny "piece faharoa afaka manala"
      // dia soloina fotsiny ity fepetra ity.
      var effectiveCaptured = (firstMover === null || firstMover === myColor)
        ? capturedSpots
        : []; // tsy firstMover → tsy afaka manala pièce

      // ── PIÈCE IRAY MONJA no esorina (voalohany ao amin'ny effectiveCaptured) ──
      // Ny lojika manala pièce maro dia voasoratra fa MBOLA TSY AMPIASAINA.
      if (effectiveCaptured.length > 0) {
        delete newPieces[effectiveCaptured[0]]; // pièce voalohany ihany
      }
      // (effectiveCaptured[1..n] dia tsy esorina ankehitriny)

      // ── AUTO-OK / MULTI-CAPTURE : miankina amin'ny fisa pieces an'ilay tsy firstMover ──
      // Raha pieces an'ilay tsy firstMover dia 5 na latsaka → multi-capture active (player roa)
      // Raha mihoatra ny 5 → AUTO-OK foana (canContinue=false)
      //
      // Ny lojika checkAvailableCaptures dia voasoratra fa DISABLED raha > 5 pieces.
      // Rehefa ampiana fepetra hafa → ovana ity condition ity ihany.
      var nonFirstMoverColor = (firstMover === null)
        ? myOppColor
        : (firstMover === myColor ? myOppColor : myColor);
      var nonFirstMoverCount = Object.keys(newPieces).filter(function(s) {
        return newPieces[s] === nonFirstMoverColor;
      }).length;
      var multiCaptureActive = (nonFirstMoverCount <= 5);

      var canContinue = multiCaptureActive
        && wasCapture
        && checkAvailableCaptures(newPieces, target, newVisited, dir, myColor);

      // ── Mise à jour locale immédiate ───────────────────────────
      movingInProgress = true;
      localState.pieces = newPieces;

      if (canContinue) {
        localState.movingPiece = target;
        localState.visited     = newVisited;
        localState.lastDir     = dir;
        selectedSpot   = target;
        canChangePiece = false;
        document.getElementById('stop-move-btn').classList.add('active');
      } else {
        localState.turn        = myOppColor;
        localState.movingPiece = '';
        localState.visited     = [];
        localState.lastDir     = '';
        selectedSpot    = null;
        lastBlockedSpot = null;
        canChangePiece  = true;
        document.getElementById('stop-move-btn').classList.remove('active');
      }

      // Guide affiché immédiatement après le mouvement
      if (canContinue && selectedSpot) {
        renderGuides(selectedSpot, localState);
      } else {
        document.getElementById('guides-group').innerHTML = '';
      }

      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);

      // ── Envoi au backend (fire-and-forget, sans rollback) ──────
      // Nalefa effectiveCaptured ([] raha tsy firstMover) mba mifanaraka amin'ny UI
      sendMoveToBackend(origin, target, effectiveCaptured, dir);

      // ── Réconciliation différée ────────────────────────────────
      // On attend RECONCILE_DELAY après le DERNIER mouvement du turn
      // pour vérifier que tout est cohérent côté backend
      if (!canContinue) {
        scheduleReconcile();
      }
    }

    function handleStopBtn() {
      if (!localState || localState.turn !== myColor || !localState.movingPiece) return;
      var piecesSnapshot = Object.assign({}, localState.pieces);

      movingInProgress = true;
      localState.turn        = myOppColor;
      localState.movingPiece = '';
      localState.visited     = [];
      localState.lastDir     = '';
      selectedSpot    = null;
      lastBlockedSpot = null;
      canChangePiece  = true;
      document.getElementById('stop-move-btn').classList.remove('active');
      document.getElementById('guides-group').innerHTML = '';
      updateTurnIndicator(localState.turn);
      renderPieces(localState.pieces, localState);

      // Envoyer stop au backend
      callApi(GAME_API_URL, 'stop-move', { uid: myUid, gameId: gameId, pieces: piecesSnapshot })
        .catch(function(e) { console.warn('stop-move error', e); });

      scheduleReconcile();
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 9 — Envoi backend & réconciliation
    //
    //  Principe :
    //  - Chaque mouvement est envoyé immédiatement (fire-and-forget)
    //  - Aucun rollback UI pendant les mouvements
    //  - Après le dernier mouvement du turn (fin ou stop), on attend
    //    RECONCILE_DELAY ms, puis on vérifie le backend.
    //  - Si l'adversaire a déjà reçu l'état (polling côté serveur),
    //    on l'affiche immédiatement sans attendre.
    //  - En cas de désync réseau : on prend le lastDir/movingPiece
    //    du backend comme "position de récupération" (jamais de retour arrière).
    // ═══════════════════════════════════════════════════════════════

    function sendMoveToBackend(origin, target, capturedSpots, dir) {
      callApi(GAME_API_URL, 'make-move', {
        uid: myUid, gameId: gameId,
        origin: origin, target: target,
        capturedSpots: capturedSpots, dir: dir
      }).catch(function(e) {
        console.warn('make-move backend error (non-blocking):', e);
        // Pas de rollback UI : on laisse la réconciliation gérer ça
      });
    }

    function scheduleReconcile() {
      if (reconcileTimer) clearTimeout(reconcileTimer);
      reconcileTimer = setTimeout(function() {
        reconcileTimer = null;
        doReconcile();
      }, RECONCILE_DELAY);
    }

    async function doReconcile() {
      try {
        var d = await callApi(GAME_API_URL, 'get-state', { uid: myUid, gameId: gameId });
        if (!d.success) return;

        movingInProgress = false;

        var serverTurn = d.game.turn;

        if (serverTurn !== myColor) {
          // Le backend a bien changé de tour → état correct
          // Si l'UI affiche déjà le bon état (tour adversaire), ne rien faire
          if (localState.turn !== myColor) return; // déjà ok
          // Sinon, synchroniser
          localState = copyState(d.game);
          selectedSpot    = null;
          lastBlockedSpot = null;
          canChangePiece  = true;
          pendingCaptures = { approach: [], withdrawal: [], moveData: null };
          document.getElementById('guides-group').innerHTML = '';
          document.getElementById('stop-move-btn').classList.remove('active');
          applyLocalState();

        } else {
          // Le backend dit encore mon tour → soit le move est toujours en cours
          // (multi-capture), soit il y a eu un souci réseau partiel.
          // On prend la position backend comme référence SANS remettre en arrière :
          // on adopte le movingPiece du serveur comme point de départ.
          var serverMoving = d.game.movingPiece || '';
          if (serverMoving) {
            // Le serveur a un movingPiece : si l'UI est déjà sur un meilleur état,
            // on garde l'UI. Sinon on adopte le serveur.
            selectedSpot   = localState.movingPiece || serverMoving;
            canChangePiece = false;
            localState.movingPiece = selectedSpot;
            document.getElementById('stop-move-btn').classList.add('active');
          }
          // Rerender avec le state actuel (pas de rollback)
          if (selectedSpot) renderGuides(selectedSpot, localState);
          renderPieces(localState.pieces, localState);
          updateTurnIndicator(localState.turn);
        }
      } catch(e) {
        movingInProgress = false;
        console.warn('reconcile error', e);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 10 — Rendu des pièces
    // ═══════════════════════════════════════════════════════════════

    function renderPieces(pieces, stateData) {
      var grp           = document.getElementById('pieces-group');
      var isMyTurn      = stateData.turn === myColor;
      var globalCapture = playerHasAnyCapture(pieces, myColor);

      var newPiecesOnBoard = {};
      var vanished = Object.keys(piecesOnBoard).filter(function(k) { return !pieces[k]; });
      var appeared = Object.keys(pieces).filter(function(k) { return !piecesOnBoard[k]; });

      vanished.forEach(function(vKey) {
        var color  = piecesOnBoard[vKey].color;
        var target = null;
        for (var i = 0; i < appeared.length; i++) {
          if (pieces[appeared[i]] === color) { target = appeared[i]; break; }
        }
        if (target) {
          newPiecesOnBoard[target] = piecesOnBoard[vKey];
          appeared = appeared.filter(function(a) { return a !== target; });
        } else {
          piecesOnBoard[vKey].el.remove();
        }
      });

      appeared.forEach(function(aKey) {
        var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'piece-group');
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('r', 8);
        g.appendChild(c);
        grp.appendChild(g);
        newPiecesOnBoard[aKey] = { el: g, color: pieces[aKey] };
      });

      Object.keys(pieces).forEach(function(k) {
        if (!newPiecesOnBoard[k]) newPiecesOnBoard[k] = piecesOnBoard[k];
      });
      piecesOnBoard = newPiecesOnBoard;

      var hasPending = pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0;

      Object.keys(pieces).forEach(function(spot) {
        var ri = rows.indexOf(spot[0]), ci = cols.indexOf(spot[1]);
        if (ri < 0 || ci < 0) return;
        var entry = piecesOnBoard[spot];
        if (!entry) return;
        var g = entry.el, circle = g.querySelector('circle');

        var svgX = ci * 50;
        var svgY = ri * 50;
        g.setAttribute('transform', 'translate(' + svgX + ',' + svgY + ')');
        circle.setAttribute('fill', 'url(#' + pieces[spot] + '-pat)');
        circle.removeAttribute('class');
        circle.style.pointerEvents = 'all';
        // Rehefa manindry pio, alefa any amin'ny spot marina (mba tsy hivaingana ny click)
        circle.onclick = (function(s) {
          return function(e) { e.stopPropagation(); handleSpotClick(s); };
        })(spot);

        if (isMyTurn && pieces[spot] === myColor) {
          if (selectedSpot === spot) {
            circle.setAttribute('class', 'selected-piece');
          } else if (lastBlockedSpot === spot) {
            circle.setAttribute('class', 'blocked-piece');
          } else if (!stateData.movingPiece) {
            // ── FIRST MOVER CHECK ──────────────────────────────────────────
            // firstMover → lojika normal : movable-piece raha mahita capture (na misy capture)
            //   (Ny canPieceMove miaraka amin'ny globalCapture no manapa-kevitra)
            // tsy firstMover → movable-piece raha afaka mihetsika any na aiza na aiza
            //   (tsy mitady capture — canPieceMove miaraka amin'ny globalCapture=false)
            //   (Ny lojika taloha miaraka amin'ny globalCapture dia voasoratra fa DISABLED eto)
            var amIFirstMoverR = (firstMover === null || firstMover === myColor);
            var gcForRender    = amIFirstMoverR ? globalCapture : false;
            if (canPieceMove(spot, pieces, myColor, gcForRender))
              circle.setAttribute('class', 'movable-piece');
          }
        }

        var isApp  = pendingCaptures.approach.indexOf(spot)   !== -1;
        var isWith = pendingCaptures.withdrawal.indexOf(spot) !== -1;
        g.querySelectorAll('.cross-line').forEach(function(l) { l.remove(); });

        if (isApp || isWith) {
          circle.classList.add('capture-target');
          circle.style.pointerEvents = 'all';
          var ct = isApp ? 'approach' : 'withdrawal';
          // Override onclick — eto confirmCapture no ilaina fa tsy handleSpotClick
          circle.onclick = (function(type) {
            return function(e) { e.stopPropagation(); confirmCapture(type); };
          })(ct);
          g.appendChild(createCross(-5,-5,5,5));
          g.appendChild(createCross(5,-5,-5,5));
        }
      });

      var board = document.getElementById('game-board');
      if (!isMyTurn || hasPending) board.classList.add('lock-board');
      else board.classList.remove('lock-board');
    }

    function createCross(x1,y1,x2,y2) {
      var l = document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('class','cross-line');
      return l;
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 11 — Guides (points jaunes) — toujours affichés
    // ═══════════════════════════════════════════════════════════════

    function renderGuides(startSpot, stateData) {
      var grp = document.getElementById('guides-group');
      if (!grp) return;
      grp.innerHTML = '';
      if (!startSpot) return;

      var pieces  = stateData.pieces;
      var visited = stateData.visited  || [];
      var lastDir = stateData.lastDir  || '';
      var moves   = allowedMoves[startSpot] || [];

      // ── FIRST MOVER CHECK ──────────────────────────────────────────────────
      // Raha myColor === firstMover (na mbola tsy set) → lojika normal (mitady capture)
      // Raha myColor !== firstMover → toerana malalaka rehetra no asehana (tsy mijery capture)
      //
      // Ny lojika taloha (globalCapturePossible + isCaptureMove) dia voasoratra
      // fa DISABLED ho an'ilay tsy firstMover — rehefa hampiana → ovana ity fepetra ity.
      var amIFirstMover = (firstMover === null || firstMover === myColor);

      if (amIFirstMover) {
        // ── firstMover : lojika normal — mitady capture ──────────────────────
        var globalCapturePossible = playerHasAnyCapture(pieces, myColor);
        moves.forEach(function(target) {
          if (pieces[target] || visited.indexOf(target) !== -1) return;
          var caps = getCaptures(pieces, startSpot, target, myColor);
          var isCaptureMove = caps.approach.length > 0 || caps.withdrawal.length > 0;
          if (globalCapturePossible && !isCaptureMove) return; // voasoratra fa active ho firstMover

          var r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
          var r2 = rows.indexOf(target[0]),    c2 = cols.indexOf(target[1]);
          var dir = (r2-r1) + ',' + (c2-c1);
          if (!canChangePiece && lastDir === dir) return;

          var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', c2 * 50); dot.setAttribute('cy', r2 * 50);
          dot.setAttribute('r', 6); dot.setAttribute('class', 'guide-dot');
          grp.appendChild(dot);
        });
      } else {
        // ── tsy firstMover : toerana malalaka rehetra, tsy mijery capture ────
        // (Ny lojika capture dia voasoratra ao ambony fa DISABLED eto)
        moves.forEach(function(target) {
          if (pieces[target] || visited.indexOf(target) !== -1) return;
          var r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
          var r2 = rows.indexOf(target[0]),    c2 = cols.indexOf(target[1]);
          var dir = (r2-r1) + ',' + (c2-c1);
          if (!canChangePiece && lastDir === dir) return;

          var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', c2 * 50); dot.setAttribute('cy', r2 * 50);
          dot.setAttribute('r', 6); dot.setAttribute('class', 'guide-dot');
          grp.appendChild(dot);
        });
      }
    }


    // ═══════════════════════════════════════════════════════════════
    //  SECTION 12 — Règles du jeu
    // ═══════════════════════════════════════════════════════════════

    function getCaptures(pieces, s, e, color) {
      var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(e[0]),c2=cols.indexOf(e[1]);
      var enemy=color==='maintso'?'mena':'maintso', dr=r2-r1, dc=c2-c1;
      function scan(row,col,sr,sc) {
        var res=[],cr=row+sr,cc=col+sc;
        while(cr>=0&&cr<5&&cc>=0&&cc<9&&pieces[rows[cr]+cols[cc]]===enemy){res.push(rows[cr]+cols[cc]);cr+=sr;cc+=sc;}
        return res;
      }
      return { approach: scan(r2,c2,dr,dc), withdrawal: scan(r1,c1,-dr,-dc) };
    }

    function playerHasAnyCapture(pieces, color) {
      var sl = Object.keys(pieces);
      for (var i=0;i<sl.length;i++) {
        var s=sl[i]; if(pieces[s]!==color)continue;
        var mv=allowedMoves[s]||[];
        for (var j=0;j<mv.length;j++) {
          var t=mv[j]; if(!pieces[t]){var c=getCaptures(pieces,s,t,color);if(c.approach.length>0||c.withdrawal.length>0)return true;}
        }
      }
      return false;
    }

    function canPieceMove(spot, pieces, color, globalCapture) {
      var mv=allowedMoves[spot]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i]; if(pieces[t])continue;
        var caps=getCaptures(pieces,spot,t,color);
        var isCap=caps.approach.length>0||caps.withdrawal.length>0;
        if(globalCapture?isCap:true)return true;
      }
      return false;
    }

    function checkAvailableCaptures(pieces, s, visited, lastDir, color) {
      var mv=allowedMoves[s]||[];
      for(var i=0;i<mv.length;i++){
        var t=mv[i];
        if(pieces[t]||(visited&&visited.indexOf(t)!==-1))continue;
        var r1=rows.indexOf(s[0]),c1=cols.indexOf(s[1]),r2=rows.indexOf(t[0]),c2=cols.indexOf(t[1]);
        var dir=(r2-r1)+','+(c2-c1);
        if(lastDir&&lastDir===dir)continue;
        var caps=getCaptures(pieces,s,t,color);
        if(caps.approach.length>0||caps.withdrawal.length>0)return true;
      }
      return false;
    }

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 13 — Historique hetsika adversaire (tahiry fotsiny)
    // ═══════════════════════════════════════════════════════════════
    // Ny lastTurnHistory ao amin'ny server dia mitahiry ny lalana
    // rehetra nalehan'ny adversaire tamin'ny turn farany.
    // Azo ampiasaina avy eo raha ilaina (résumé, fanamarihana, sns.)
    //
    // Naferina ny replay animation:
    //   - Rehefa mahita hetsika vaovao avy amin'ny adversaire ny polling,
    //     dia mampiseho mivantana ny état farany (tsy mamerina dingana).
    //   - Ny lastTurnHistory dia voatahiry ao amin'ny server ihany.

    // ═══════════════════════════════════════════════════════════════
    //  SECTION 14 — Lancement
    // ═══════════════════════════════════════════════════════════════

    init();

  })();
  </script>
</body>
